        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{item.name} <span style={{fontFamily:"'DM Mono',monospace",color:C.ac,fontSize:11}}>×{item.Qty}</span></div></div>
        <div style={{display:'flex',gap:4}}>
          {['prep','load','loadout'].map((k,i)=><div key={k} style={{width:16,height:16,borderRadius:3,background:item[k]?[C.wa,C.ok,C.inf][i]:C.s2,border:`1px solid ${item[k]?[C.wa,C.ok,C.inf][i]:C.br}`}}/>)}
        </div>
      </div>)}
    </div>}

    {/* Incidents */}
    {inc.length>0&&<div style={{marginBottom:16}}>
      <SecHdr title={`INCIDENTS · ${inc.length}`}/>
      {inc.map(i=><Card key={i.IncidentID} style={{marginBottom:8,border:`1px solid ${C.er}44`}}>
        <div style={{fontWeight:600,fontSize:13,color:C.er}}>{i.collabName}</div>
        <Mono s c={C.mu}>{i.Category} · {fmtDate(i.Date)}</Mono>
        {i.Description&&<div style={{fontSize:12,color:C.mu,marginTop:4}}>{i.Description}</div>}
      </Card>)}
    </div>}

    {ev.Notes&&<Card style={{marginBottom:16}}><Mono s c={C.mu} style={{marginBottom:6,letterSpacing:2}}>ΣΗΜΕΙΩΣΕΙΣ</Mono><p style={{fontSize:13,color:C.mu,lineHeight:1.6}}>{ev.Notes}</p></Card>}

    <div style={{display:'flex',gap:8,marginBottom:8}}>
      <button onClick={()=>window.print()} style={{flex:1,...btnBase}}>🖨️ Print</button>
    </div>

    {isPM&&onDelete&&(!confirmDel
      ?<Btn danger full onClick={()=>setConfirmDel(true)}>Διαγραφή Event</Btn>
      :<Card style={{border:`1px solid ${C.er}`}}>
        <div style={{fontSize:13,color:C.er,marginBottom:12}}>Μη αναστρέψιμη ενέργεια. Θα σταλεί ειδοποίηση ακύρωσης στο crew. Είσαι σίγουρος;</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={onDelete} style={{flex:1,background:C.er,color:'#fff',border:'none',borderRadius:8,padding:12,fontFamily:'inherit',fontWeight:800,cursor:'pointer',fontSize:14}}>Διαγραφή + Ειδοποίηση</button>
          <Btn onClick={()=>setConfirmDel(false)} style={{flex:1}}>Άκυρο</Btn>
        </div>
      </Card>
    )}
  </div>);
}
const btnBase={background:C.s2,color:C.tx,border:`1px solid ${C.br}`,borderRadius:10,padding:'11px 16px',fontSize:13,fontWeight:600,fontFamily:"'Bricolage Grotesque',sans-serif",cursor:'pointer'};

// ─── SCHEDULING HELPERS ───────────────────────────────────────────────────
const SKILL_LABELS={drive:'Drive 🚐',sound:'Sound 🎚️',lights:'Lights 💡',dj:'DJ 🎵'};
const ROLE_HAS_SETUP={
  'Sound Operator':true,'Lighting Operator':true,'AV Tech':true,'Installation Tech':true,
  'Setup Block':true,'Setup+Teardown':true
};
const ROLE_HAS_TEARDOWN={
  'Sound Operator':true,'Lighting Operator':true,'AV Tech':true,
  'Teardown Block':true,'Setup+Teardown':true
};

function collabSkills(c){
  const pr=(c.PrimaryRoles||'').split(',').map(r=>r.trim());
  return {
    drive: c.CanDrive===true||(c.CanDrive===true||c.CanDrive==='true'),
    sound: pr.some(r=>r.includes('Sound')),
    lights:pr.some(r=>r.includes('Lighting')),
    dj:    pr.some(r=>r.includes('DJ')),
  };
}
function kpiAvgC(c,keys=['K1','K2','K3','K4']){
  const v=keys.map(k=>Number(c[k])||0).filter(x=>x>0);
  return v.length?v.reduce((a,b)=>a+b,0)/v.length:2.5;
}
function combinations_(arr,k){
  if(k===1)return arr.map(x=>[x]);
  const out=[];
  for(let i=0;i<arr.length;i++)
    for(const rest of combinations_(arr.slice(i+1),k-1)) out.push([arr[i],...rest]);
  return out;
}
function groupScore_(members,required){
  const cov=required.length?required.filter(s=>members.some(m=>collabSkills(m)[s])).length/required.length:1;
  const kpi=members.reduce((s,m)=>s+kpiAvgC(m),0)/members.length;
  const avl=members.reduce((s,m)=>s+(Number(m.K5)||2.5),0)/members.length;
  return cov*100+kpi*10+avl;
}
function findGroups_(available,required,size,n=3){
  if(available.length<size)return[];
  return combinations_(available,size)
    .map(members=>({members,score:groupScore_(members,required)}))
    .sort((a,b)=>b.score-a.score).slice(0,n);
}
function autoRole_(m,eventType,required,alreadyAssigned){
  const sk=collabSkills(m);
  const isLive=eventType==='Live', isWedding=eventType==='Wedding';
  if(required.includes('dj')&&sk.dj&&!alreadyAssigned.has('dj'))
    return isWedding?'Wedding DJ':'Event DJ';
  if(required.includes('sound')&&sk.sound&&!alreadyAssigned.has('sound'))
    return isLive?'Sound Operator':'AV Tech';
  if(required.includes('lights')&&sk.lights&&!alreadyAssigned.has('lights'))
    return isLive?'Lighting Operator':'AV Tech';
  return 'AV Tech';
}
function calcMemberFee_(role,travelPrefectures,driverEvent,setupDate,teardownDate,eventDate,driverSetup,driverTeardown){
  const base=ROLE_FEES[role]||0;
  const travel=(Number(travelPrefectures)||0)*20;
  const drEv=driverEvent?20:0;
  const setupDiff=setupDate&&setupDate!==eventDate;
  const tdDiff=teardownDate&&teardownDate!==eventDate;
  const setupFee=setupDiff?(40+(driverSetup?20:0)):0;
  const tdFee=tdDiff?(40+(driverTeardown?20:0)):0;
  return {base,travel,drEv,setupFee,tdFee,total:base+travel+drEv+setupFee+tdFee};
}

// ─── SCHEDULING PANEL (3-step) ────────────────────────────────────────────
// ─── DIRECT ASSIGN PANEL ─────────────────────────────────────────────────
function DirectAssignPanel({auth,ev,collabs,busyMap,onDone,show}){
  const [open,setOpen]=useState(false);
  const [collabId,setCollabId]=useState('');
  const [role,setRole]=useState('AV Tech');
  const [customFee,setCustomFee]=useState('');
  const [desc,setDesc]=useState('');
  const [driverEvent,setDriverEvent]=useState(false);
  const [setupDate,setSetupDate]=useState('');
  const [teardownDate,setTeardownDate]=useState('');
  const [driverSetup,setDriverSetup]=useState(false);
  const [driverTeardown,setDriverTeardown]=useState(false);
  const [saving,setSaving]=useState(false);

  const travelPrefectures=Number(ev.TravelPrefectures)||0;
  const assignedIds=new Set((ev.assignments||[]).map(a=>a.CollabID));
  const selectedCollab=collabs.find(c=>c.CollabID===collabId);
  const canDrive=selectedCollab?.CanDrive===true||selectedCollab?.CanDrive==='true';
  const hasSetup=role==='Other'||ROLE_HAS_SETUP[role];
  const hasTeardown=role==='Other'||ROLE_HAS_TEARDOWN[role];
  const setupDiff=hasSetup&&setupDate&&setupDate!==ev.Date;
  const tdDiff=hasTeardown&&teardownDate&&teardownDate!==ev.Date;
  const fees=calcMemberFee_(role,travelPrefectures,driverEvent,setupDate,teardownDate,ev.Date,driverSetup,driverTeardown);
  const customBase=role==='Other'?Number(customFee)||0:null;
  const displayTotal=role==='Other'?customBase+fees.travel+fees.drEv+fees.setupFee+fees.tdFee:fees.total;

  const reset=()=>{setCollabId('');setRole('AV Tech');setCustomFee('');setDesc('');setDriverEvent(false);setSetupDate('');setTeardownDate('');setDriverSetup(false);setDriverTeardown(false);};

  const doAssign=async()=>{
    if(!collabId)return;
    setSaving(true);
    try{
      const base=role==='Other'?Number(customFee)||0:fees.base;
      await call('assignCrew',auth.pin,ev.EventID,collabId,role,
        base,fees.travel,fees.drEv,
        role==='Other',desc||'',
        setupDate||'',fees.setupFee,
        teardownDate||'',fees.tdFee
      );
      show('✅ Προστέθηκε');setOpen(false);reset();await onDone();
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  if(!open) return(
    <button onClick={()=>setOpen(true)} style={{width:'100%',background:'none',border:`1px dashed ${C.br}`,color:C.mu,borderRadius:8,padding:'10px',fontFamily:'inherit',fontSize:13,cursor:'pointer'}}>
      + Προσθήκη ατόμου χωρίς KPI flow
    </button>
  );

  const collabOptions=[{value:'',label:'Επίλεξε συνεργάτη…'},...collabs.filter(c=>{
    if(!c.Active||c.Active==='false') return false;
    if(assignedIds.has(c.CollabID)) return false;
    if(ev.Date && (busyMap[c.CollabID]||[]).includes(ev.Date)) return false;
    return true;
  }).sort((a,b)=>(Number(b.OverallKPI)||0)-(Number(a.OverallKPI)||0)).map(c=>({value:c.CollabID,label:c.Name+' · '+Number(c.OverallKPI||0).toFixed(2)+' KPI'}))];

  return(<div style={{display:'flex',flexDirection:'column',gap:10}}>
    {/* Collab picker */}
    <Inp label="Συνεργάτης" value={collabId} onChange={v=>{setCollabId(v);setDriverEvent(false);setDriverSetup(false);setDriverTeardown(false);}} options={collabOptions}/>
    {/* Role */}
    <div>
      <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>ΡΟΛΟΣ</Mono>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {ALL_ROLES.map(r=><button key={r} onClick={()=>setRole(r)} style={{background:role===r?C.ac:'transparent',color:role===r?'#000':C.mu,border:`1px solid ${role===r?C.ac:C.br}`,borderRadius:6,padding:'4px 9px',fontSize:11,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>{r}</button>)}
      </div>
    </div>
    {role==='Other'&&<div style={{display:'flex',gap:8}}>
      <div style={{flex:2}}><Inp label="Περιγραφή" value={desc} onChange={setDesc} placeholder="π.χ. Hosting…"/></div>
      <div style={{flex:1}}><Inp label="Αμοιβή €" value={customFee} onChange={setCustomFee} type="number"/></div>
    </div>}
    {/* Driver event day — only if collab can drive */}
    {canDrive&&<Toggle label={`Οδηγεί (event day +20€)`} checked={driverEvent} onChange={setDriverEvent}/>}
    {/* Travel */}
    {travelPrefectures>0&&<div style={{padding:'8px 12px',background:C.s2,borderRadius:8,display:'flex',justifyContent:'space-between'}}>
      <Mono s c={C.mu}>Travel ({travelPrefectures} νομοί ×20€)</Mono>
      <Mono s c={C.ac} style={{fontWeight:700}}>+{fees.travel}€</Mono>
    </div>}
    {/* Setup date */}
    {hasSetup&&<div>
      <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>📦 ΗΜΕΡΑ ΣΤΗΣΙΜΑΤΟΣ</Mono>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input type="date" value={setupDate} onChange={e=>setSetupDate(e.target.value)} style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'8px 10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/>
        {setupDiff?<Mono s c={C.ac}>≠ event +40€</Mono>:<Mono s c={C.mu}>= event day</Mono>}
      </div>
      {setupDiff&&canDrive&&<div style={{marginTop:6}}><Toggle label="Οδηγεί (setup day +20€)" checked={driverSetup} onChange={setDriverSetup}/></div>}
    </div>}
    {/* Teardown date */}
    {hasTeardown&&<div>
      <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>📤 ΗΜΕΡΑ ΜΑΖΕΜΑΤΟΣ</Mono>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input type="date" value={teardownDate} onChange={e=>setTeardownDate(e.target.value)} style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'8px 10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/>
        {tdDiff?<Mono s c={C.ac}>≠ event +40€</Mono>:<Mono s c={C.mu}>= event day</Mono>}
      </div>
      {tdDiff&&canDrive&&<div style={{marginTop:6}}><Toggle label="Οδηγεί (teardown day +20€)" checked={driverTeardown} onChange={setDriverTeardown}/></div>}
    </div>}
    {/* Total */}
    <div style={{padding:'8px 12px',background:C.s2,borderRadius:8,display:'flex',justifyContent:'space-between'}}>
      <Mono s c={C.mu}>Σύνολο αμοιβής</Mono>
      <Mono s c={C.ac} style={{fontWeight:700,fontSize:14}}>{displayTotal}€</Mono>
    </div>
    <div style={{display:'flex',gap:8}}>
      <Btn onClick={doAssign} disabled={saving||!collabId} accent style={{flex:1}}>{saving?'…':'Ανάθεση'}</Btn>
      <Btn onClick={()=>{setOpen(false);reset();}} style={{flex:1}}>Άκυρο</Btn>
    </div>
  </div>);
}

// ─── ADD EXTRA ROLE ───────────────────────────────────────────────────────
function AddExtraRolePanel({addRoleFor,asgn,ev,auth,onDone,show}){
  const [role,setRole]=useState('Setup Block');
  const [customFee,setCustomFee]=useState('');
  const [desc,setDesc]=useState('');
  const [saving,setSaving]=useState(false);
  if(!addRoleFor)return null;
  const collab=asgn.find(a=>a.CollabID===addRoleFor);
  if(!collab)return null;
  const doAdd=async()=>{
    setSaving(true);
    try{const base=role==='Other'?Number(customFee)||0:(ROLE_FEES[role]||0);
      await call('assignCrew',auth.pin,ev.EventID,collab.CollabID,role,base,0,0,role==='Other',desc||'','','0','','0');
      show('✅ Ρόλος προστέθηκε');await onDone();}
    catch(e){show('❌ '+e.message);}
    setSaving(false);
  };
  return(<Card style={{marginTop:8,border:`1px solid ${C.ac}44`,background:C.ac+'08'}}>
    <Mono s c={C.ac} style={{marginBottom:10,letterSpacing:1}}>+ ΡΟΛΟΣ: {collab.collabName}</Mono>
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
      {ALL_ROLES.map(r=><button key={r} onClick={()=>setRole(r)} style={{background:role===r?C.ac:'transparent',color:role===r?'#000':C.mu,border:`1px solid ${role===r?C.ac:C.br}`,borderRadius:6,padding:'4px 9px',fontSize:11,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>{r}</button>)}
    </div>
    {role==='Other'&&<div style={{display:'flex',gap:8,marginBottom:10}}>
      <div style={{flex:2}}><Inp label="Περιγραφή" value={desc} onChange={setDesc} placeholder="π.χ. Hosting..."/></div>
      <div style={{flex:1}}><Inp label="Αμοιβή €" value={customFee} onChange={setCustomFee} type="number"/></div>
    </div>}
    {role!=='Other'&&<Mono s c={C.mu} style={{marginBottom:10}}>Αμοιβή: {ROLE_FEES[role]||0}€</Mono>}
    <Btn onClick={doAdd} disabled={saving} accent>{saving?'...':'Προσθήκη'}</Btn>
  </Card>);
}

function SchedulingPanel({auth,ev,collabs,busyMap,onDone,onBack}){
  const [step,setStep]=useState(1);
  const [skills,setSkills]=useState({drive:false,sound:false,lights:false,dj:false});
  const [size,setSize]=useState(2);
  const [manual,setManual]=useState(new Set()); // manually unavailable for this event
  const [groups,setGroups]=useState([]);
  const [picked,setPicked]=useState(null);
  const [roleMap,setRoleMap]=useState({}); // collabId → {role,driverEvent,setupDate,teardownDate,driverSetup,driverTeardown,override,overrideNote}
  const [saving,setSaving]=useState(false);
  const {msg,show}=useMsg();

  const asgn=ev.assignments||[];
  const totalCost=asgn.reduce((s,a)=>s+(Number(a.TotalFee)||0),0);
  const travelPrefectures=parseInt(ev.TravelPrefectures)||0;
  const required=Object.keys(skills).filter(s=>skills[s]);
  const assignedIds=new Set(asgn.map(a=>a.CollabID));

  // Blocked = assigned to another event on the same date (from busyMap)
  const busyIds=new Set(collabs.filter(c=>{
    if(assignedIds.has(c.CollabID))return false;
    if(!ev.Date)return false;
    return (busyMap[c.CollabID]||[]).includes(ev.Date);
  }).map(c=>c.CollabID));
  // Check if collab is unavailable on event date (expand ranges client-side)
  const isUnavailOnDate=(c,date)=>{
    if(!date)return false;
    return (c.UnavailableDates||'').split(',').filter(Boolean).some(e=>{
      if(e.includes(':')){const[f,t]=e.split(':');return date>=f&&date<=t;}
      return e===date;
    });
  };
  const available=collabs.filter(c=>!busyIds.has(c.CollabID)&&!manual.has(c.CollabID)&&!assignedIds.has(c.CollabID)&&c.Active!=='false'&&!isUnavailOnDate(c,ev.Date));

  const toggleManual=id=>setManual(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleSkill=s=>setSkills(p=>({...p,[s]:!p[s]}));

  const handleFind=()=>{
    const g=findGroups_(available,required,size,3);
    setGroups(g);setStep(2);
  };

  const handlePick=g=>{
    setPicked(g);
    const rm={};
    const assigned=new Set();
    const isLive=ev.Type==='Live',isWedding=ev.Type==='Wedding';

    // First pass: assign roles by skill
    g.members.forEach(m=>{
      const sk=collabSkills(m);
      let role='AV Tech';
      if(required.includes('dj')&&sk.dj&&!assigned.has('dj')){
        role=isWedding?'Wedding DJ':'Event DJ'; assigned.add('dj');
      } else if(required.includes('sound')&&sk.sound&&!assigned.has('sound')){
        role=isLive?'Sound Operator':'AV Tech'; assigned.add('sound');
      } else if(required.includes('lights')&&sk.lights&&!assigned.has('lights')){
        role=isLive?'Lighting Operator':'AV Tech'; assigned.add('lights');
      }
      rm[m.CollabID]={role,driverEvent:false,setupDate:'',teardownDate:'',driverSetup:false,driverTeardown:false,override:false,overrideNote:''};
    });

    // Second pass: assign driver to ONE person — lowest role fee among those with drive skill
    const driverCandidates=g.members
      .filter(m=>collabSkills(m).drive)
      .sort((a,b)=>(ROLE_FEES[rm[a.CollabID]?.role]||0)-(ROLE_FEES[rm[b.CollabID]?.role]||0));
    if(driverCandidates.length>0){
      rm[driverCandidates[0].CollabID].driverEvent=true;
    }

    setRoleMap(rm);setStep(3);
  };

  const doSaveAll=async()=>{
    if(!picked)return;
    setSaving(true);
    try{
      for(const m of picked.members){
        const rm=roleMap[m.CollabID]||{};
        const role=rm.role||'AV Tech';
        const fees=calcMemberFee_(role,travelPrefectures,rm.driverEvent,rm.setupDate,rm.teardownDate,ev.Date,rm.driverSetup,rm.driverTeardown);
        const base=role==='Other'?Number(rm.otherFee||0):fees.base;
        const isOther=role==='Other';
        await call('assignCrew',auth.pin,ev.EventID,m.CollabID,role,
          base,fees.travel,fees.drEv,rm.override||isOther,isOther?(rm.otherDesc||''):(rm.overrideNote||''),
          rm.setupDate||'',fees.setupFee,rm.teardownDate||'',fees.tdFee
        );
        // Save extra roles
        for(const er of (rm.extraRoles||[])){
          const erFee=er.role==='Other'?Number(er.fee||0):(ROLE_FEES[er.role]||0);
          await call('assignCrew',auth.pin,ev.EventID,m.CollabID,er.role,
            erFee,0,0,er.role==='Other',er.desc||'','',0,'',0
          );
        }
      }
      show('✅ Crew αποθηκεύτηκε');
      await onDone();
      setStep(1);setSkills({drive:false,sound:false,lights:false,dj:false});
      setManual(new Set());setGroups([]);setPicked(null);setRoleMap({});
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  const doRemove=async rowId=>{try{await call('removeAssignment',auth.pin,rowId);await onDone();}catch(e){show('❌ '+e.message);}};
  const [addRoleFor,setAddRoleFor]=useState(null);

  const kpiColor=v=>v>=4?C.ok:v>=3?C.wa:C.er;
  const KPI_KEYS=['K1','K2','K3','K4','K5'];
  const KPI_SHORT={K1:'P',K2:'B',K3:'A',K4:'T',K5:'D'};

  // ── STEP 1 ────────────────────────────────────────────────────────────────
  if(step===1)return(
    <div style={{padding:'24px 24px 40px'}} className="fade">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <BackBtn onClick={onBack}/>
        <div style={{flex:1}}><div style={{fontSize:20,fontWeight:800}}>Scheduling</div><Mono s c={C.mu}>{ev.Name} · {fmtDate(ev.Date)}</Mono></div>
      </div>
      <Toast msg={msg}/>
      <Card style={{marginBottom:12}}><CostGauge cost={totalCost} revenue={Number(ev.Revenue)||0}/></Card>

      {asgn.length>0&&<div style={{marginBottom:16}}>
        <SecHdr title={'ΤΡΕΧΟΝ CREW · '+asgn.length}/>
        {asgn.map(a=><div key={a.RowID} style={{display:'flex',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.br}`}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13}}>{a.collabName}</div>
            <Mono s c={C.mu}>{a.AssignedRole}{Number(a.TravelFee)>0?' · travel '+a.TravelFee+'€':''}{Number(a.DriverFee)>0?' · driver 20€':''}{a.SetupDate&&a.SetupDate!==ev.Date?' · setup '+fmtDate(a.SetupDate):''}{a.TeardownDate&&a.TeardownDate!==ev.Date?' · teardown '+fmtDate(a.TeardownDate):''}</Mono>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.ac}}>{Number(a.TotalFee)}€</div>
            {!['true','FINALIZED',true].includes(a.Finalized)&&<button onClick={()=>setAddRoleFor(x=>x===a.CollabID?null:a.CollabID)} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:6,padding:'3px 7px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer'}}>+ΡΟΛΟΣ</button>}
            {!['true','FINALIZED',true].includes(a.Finalized)&&<XBtn onClick={()=>doRemove(a.RowID)}/>}
          </div>
        </div>)}
        <AddExtraRolePanel addRoleFor={addRoleFor} asgn={asgn} ev={ev} auth={auth} onDone={async()=>{setAddRoleFor(null);await onDone();}} show={show}/>
      </div>}

      {/* Direct assignment — without KPI flow */}
      <Card style={{marginBottom:12}}>
        <Mono s c={C.mu} style={{marginBottom:12,letterSpacing:2}}>ΑΠΕΥΘΕΙΑΣ ΠΡΟΣΘΗΚΗ</Mono>
        <DirectAssignPanel auth={auth} ev={ev} collabs={collabs} busyMap={busyMap||{}} onDone={onDone} show={show}/>
      </Card>

      <div style={{display:'flex',gap:12,marginBottom:20}}>
        <Card style={{flex:1}}>
          <Mono s c={C.mu} style={{marginBottom:12,letterSpacing:2}}>SKILLS NEEDED</Mono>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
            {Object.entries(SKILL_LABELS).map(([s,l])=><button key={s} onClick={()=>toggleSkill(s)} style={{background:skills[s]?C.ac:'transparent',color:skills[s]?'#000':C.mu,border:`1px solid ${skills[s]?C.ac:C.br}`,borderRadius:8,padding:'10px 8px',fontFamily:'inherit',fontWeight:700,fontSize:12,cursor:'pointer',textAlign:'center'}}>{l}</button>)}
          </div>
          <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>ΑΡΙΘΜΟΣ ΑΤΟΜΩΝ</Mono>
          <div style={{display:'flex',gap:6}}>
            {[1,2,3,4,5,6].map(n=><button key={n} onClick={()=>setSize(n)} style={{width:36,height:36,borderRadius:8,border:`1px solid ${size===n?C.ac:C.br}`,background:size===n?C.ac+'22':'transparent',color:size===n?C.ac:C.mu,fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:14,cursor:'pointer'}}>{n}</button>)}
          </div>
          <button onClick={handleFind} disabled={!ev.Date||!required.length||available.length<size} style={{width:'100%',marginTop:16,background:required.length&&available.length>=size?C.ac:C.s2,color:required.length&&available.length>=size?'#000':C.mu,border:'none',borderRadius:10,padding:14,fontFamily:'inherit',fontWeight:800,fontSize:14,cursor:'pointer'}}>
            Εύρεση Crew →
          </button>
          {available.length<size&&required.length>0&&<Mono s c={C.er} style={{marginTop:8,textAlign:'center'}}>Διαθέσιμοι: {available.length} · Χρειάζονται: {size}</Mono>}
        </Card>
      </div>

      {/* Unavailability panel */}
      <Card>
        <Mono s c={C.mu} style={{marginBottom:12,letterSpacing:2}}>ΔΙΑΘΕΣΙΜΟΤΗΤΑ CREW{ev.Date?' — '+fmtDate(ev.Date):''}</Mono>
        {!ev.Date&&<Mono s c={C.mu}>Επίλεξε ημερομηνία στο event πρώτα.</Mono>}
        {ev.Date&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
          {collabs.filter(c=>c.Active!=='false').map(c=>{
            const inEvent=assignedIds.has(c.CollabID);
            const isManual=manual.has(c.CollabID);
            const isDateUnavail=!inEvent&&isUnavailOnDate(c,ev.Date);
            const isBusy=!inEvent&&!isDateUnavail&&(busyMap[c.CollabID]||[]).includes(ev.Date);
            const kpi=Number(c.OverallKPI)||3;
            const blocked=isManual||isDateUnavail||isBusy;
            return(<div key={c.CollabID} style={{display:'flex',alignItems:'center',padding:'8px 10px',borderRadius:8,background:C.s2,border:`1px solid ${blocked?C.er:inEvent?C.ok:C.br}`,opacity:isManual?0.6:1}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13}}>{c.Name}{(c.CanDrive===true||c.CanDrive==='true')?' 🚐':''}{(c.HasKeys===true||c.HasKeys==='true')?' 🔑':''}</div>
                <div style={{display:'flex',gap:6,marginTop:2}}>
                  <Mono s style={{color:kpiColor(kpi)}}>{kpi.toFixed(2)} KPI</Mono>
                  {inEvent&&<Mono s c={C.ok}>✓ ορισμένος</Mono>}
                  {isDateUnavail&&<Mono s c={C.er}>αδιάθετος</Mono>}
                  {isBusy&&<Mono s c={C.er}>άλλο event</Mono>}
                </div>
              </div>
              {!inEvent&&!isDateUnavail&&!isBusy&&<button onClick={()=>toggleManual(c.CollabID)} style={{background:isManual?C.er+'22':'none',border:`1px solid ${isManual?C.er:C.br}`,color:isManual?C.er:C.mu,borderRadius:6,padding:'4px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',fontWeight:700}}>{isManual?'ΕΚΤΟΣ':'ΟΚ'}</button>}
            </div>);
          })}
        </div>}
        {manual.size>0&&<Mono s c={C.mu} style={{marginTop:8,textAlign:'center',letterSpacing:1}}>ΕΚΤΟΣ: {manual.size} · Πάτα ξανά για επαναφορά</Mono>}
      </Card>
    </div>
  );

  // ── STEP 2 ────────────────────────────────────────────────────────────────
  if(step===2){
    const rev=Number(ev.Revenue)||0;
    return(<div style={{padding:'24px 24px 40px'}} className="fade">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <BackBtn onClick={()=>setStep(1)}/>
        <div style={{flex:1}}><div style={{fontSize:20,fontWeight:800}}>Επιλογή Ομάδας</div><Mono s c={C.mu}>{size} άτομα · {fmtDate(ev.Date)}</Mono></div>
      </div>
      {rev>0&&<Card style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          <Mono s c={C.mu}>Target crew cost (30%)</Mono>
          <Mono s c={C.ac} style={{fontWeight:700}}>≤ {Math.floor(rev*0.3)}€</Mono>
        </div>
      </Card>}
      {groups.length===0&&<div style={{padding:'20px',background:C.er+'11',border:`1px solid ${C.er}44`,borderRadius:10,marginBottom:12}}><Mono s c={C.er}>⚠ Δεν βρέθηκαν αρκετοί διαθέσιμοι για τα skills που ζήτησες.</Mono></div>}
      {groups.map((g,i)=>{
        const cov={};
        required.forEach(s=>{cov[s]=g.members.some(m=>collabSkills(m)[s]);});
        const allCov=required.every(s=>cov[s]);
        // Projected cost
        const assigned=new Set();
        let projected=0;
        g.members.forEach(m=>{
          const sk=collabSkills(m);
          let role='AV Tech';
          if(required.includes('dj')&&sk.dj&&!assigned.has('dj')){role=ev.Type==='Wedding'?'Wedding DJ':'Event DJ';assigned.add('dj');}
          else if(required.includes('sound')&&sk.sound&&!assigned.has('sound')){role=ev.Type==='Live'?'Sound Operator':'AV Tech';assigned.add('sound');}
          else if(required.includes('lights')&&sk.lights&&!assigned.has('lights')){role=ev.Type==='Live'?'Lighting Operator':'AV Tech';assigned.add('lights');}
          projected+=(ROLE_FEES[role]||0)+travelPrefectures*20;
        });
        const pct=rev>0?projected/rev*100:null;
        const onTarget=pct!==null&&pct<=30;
        const pctColor=pct===null?C.mu:onTarget?C.ok:pct<=38?C.wa:C.er;
        return(<div key={i} onClick={()=>handlePick(g)} style={{background:C.s1,border:`1px solid ${C.br}`,borderRadius:14,padding:'16px 18px',marginBottom:10,cursor:'pointer'}} className="fade">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
            <Mono s c={C.mu} style={{letterSpacing:2}}>#{i+1} ΣΥΝΘΕΣΗ{!allCov?<span style={{color:C.wa}}> · ⚠ ελλιπής</span>:null}</Mono>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <Mono s c={C.tx} style={{fontWeight:700}}>{projected}€</Mono>
              {pct!==null&&<span style={{fontSize:10,fontFamily:"'DM Mono',monospace",padding:'2px 8px',borderRadius:4,fontWeight:700,background:pctColor+'22',color:pctColor,border:`1px solid ${pctColor}44`}}>{pct.toFixed(1)}% {onTarget?'✓':pct<=38?'↑':'⚠'}</span>}
            </div>
          </div>
          {g.members.map(m=>{
            const kpi=kpiAvgC(m);
            return(<div key={m.CollabID} style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{m.Name}{(m.CanDrive===true||m.CanDrive==='true')?' 🚐':''}</div>
                <Mono s c={C.mu}>{(m.PrimaryRoles||'').split(',').filter(Boolean).join(' · ')||'—'}</Mono>
              </div>
              <div style={{display:'flex',gap:3}}>
                {KPI_KEYS.map(k=>{
                  const v=Number(m[k])||0;
                  const col=v>=4?C.ok:v>=3?C.wa:v>=2?C.er:C.mu;
                  return(<div key={k} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                    <div style={{width:20,height:20,borderRadius:4,background:col+'22',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:col}}>{v||'?'}</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:C.mu}}>{KPI_SHORT[k]}</div>
                  </div>);
                })}
              </div>
            </div>);
          })}
          <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
            {required.map(s=><span key={s} style={{fontSize:10,fontFamily:"'DM Mono',monospace",padding:'2px 7px',borderRadius:4,fontWeight:700,background:cov[s]?C.ok+'22':C.er+'22',color:cov[s]?C.ok:C.er,border:`1px solid ${cov[s]?C.ok+'44':C.er+'44'}`}}>{cov[s]?'✓':'✗'} {s.toUpperCase()}</span>)}
            <span style={{marginLeft:'auto',fontSize:10,fontFamily:"'DM Mono',monospace",padding:'2px 8px',borderRadius:4,background:C.ac+'22',color:C.ac,border:`1px solid ${C.ac}44`,fontWeight:700}}>KPI {g.score.toFixed(1)}</span>
          </div>
        </div>);
      })}
    </div>);
  }

  // ── STEP 3 ────────────────────────────────────────────────────────────────
  const totalStep3=picked?.members.reduce((s,m)=>{
    const rm=roleMap[m.CollabID]||{};
    const role=rm.role||'AV Tech';
    const f=calcMemberFee_(role,travelPrefectures,rm.driverEvent,rm.setupDate,rm.teardownDate,ev.Date,rm.driverSetup,rm.driverTeardown);
    const base=role==='Other'?Number(rm.otherFee||0):f.base;
    const memberTotal=base+f.travel+f.drEv+f.setupFee+f.tdFee;
    const extra=(rm.extraRoles||[]).reduce((es,er)=>es+(er.role==='Other'?Number(er.fee||0):(ROLE_FEES[er.role]||0)),0);
    return s+memberTotal+extra;
  },0)||0;
  const rev=Number(ev.Revenue)||0;
  const pctStep3=rev>0?totalStep3/rev*100:null;
  const pctCol=pctStep3===null?C.mu:pctStep3<=30?C.ok:pctStep3<=38?C.wa:C.er;

  return(<div style={{padding:'24px 24px 60px'}} className="fade">
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <BackBtn onClick={()=>setStep(2)}/>
      <div style={{flex:1}}><div style={{fontSize:20,fontWeight:800}}>Ανάθεση Ρόλων</div><Mono s c={C.mu}>{fmtDate(ev.Date)}</Mono></div>
    </div>
    <Toast msg={msg}/>

    {rev>0&&<div style={{marginBottom:14,padding:'10px 14px',borderRadius:10,border:`1px solid ${pctCol}44`,background:pctCol+'11',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <Mono s c={C.mu}>Crew / Αμοιβή event</Mono>
      <Mono s c={pctCol} style={{fontWeight:700,fontSize:15}}>{totalStep3}€ / {rev}€ = {pctStep3?.toFixed(1)}% {pctStep3<=30?'✓ εντός 30%':'⚠ εκτός 30%'}</Mono>
    </div>}

    {picked?.members.map(m=>{
      const rm=roleMap[m.CollabID]||{role:'AV Tech',driverEvent:false,setupDate:'',teardownDate:'',driverSetup:false,driverTeardown:false};
      const role=rm.role||'AV Tech';
      const hasSetup=role==='Other'||ROLE_HAS_SETUP[role];
      const hasTeardown=role==='Other'||ROLE_HAS_TEARDOWN[role];
      const setupDiff=hasSetup&&rm.setupDate&&rm.setupDate!==ev.Date;
      const tdDiff=hasTeardown&&rm.teardownDate&&rm.teardownDate!==ev.Date;
      const fees=calcMemberFee_(role,travelPrefectures,rm.driverEvent,rm.setupDate,rm.teardownDate,ev.Date,rm.driverSetup,rm.driverTeardown);
      const otherBase=role==='Other'?Number(rm.otherFee||0):null;
      const displayTotal=role==='Other'?(otherBase+fees.travel+fees.drEv+fees.setupFee+fees.tdFee):fees.total;
      const set_=(k,v)=>setRoleMap(p=>({...p,[m.CollabID]:{...p[m.CollabID],[k]:v}}));
      return(<Card key={m.CollabID} style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{m.Name}{(m.CanDrive===true||m.CanDrive==='true')?' 🚐':''}</div>
            <Mono s c={C.mu}>{(m.PrimaryRoles||'').split(',').filter(Boolean).slice(0,2).join(' · ')}</Mono>
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:700,color:C.ac}}>{displayTotal}€</div>
        </div>

        {/* Role */}
        <div style={{marginBottom:10}}>
          <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>ΡΟΛΟΣ</Mono>
          <select value={role} onChange={e=>set_('role',e.target.value)} style={{width:'100%',background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px 12px',color:C.tx,fontFamily:'inherit',fontSize:14,outline:'none'}}>
            {ALL_ROLES.map(r=><option key={r} value={r}>{r} · {ROLE_FEES[r]||0}€</option>)}
          </select>
          {role==='Other'&&<div style={{display:'flex',gap:8,marginTop:8}}>
            <div style={{flex:2}}><Inp label="Περιγραφή" value={rm.otherDesc||''} onChange={v=>set_('otherDesc',v)} placeholder="π.χ. Hosting, MC…"/></div>
            <div style={{flex:1}}><Inp label="Αμοιβή €" value={rm.otherFee||''} onChange={v=>set_('otherFee',v)} type="number"/></div>
          </div>}
        </div>

        {/* Override */}
        <div style={{marginBottom:10}}>
          <Toggle label="Override (εκτός primary role)" checked={rm.override||false} onChange={v=>set_('override',v)}/>
          {rm.override&&<input value={rm.overrideNote||''} onChange={e=>set_('overrideNote',e.target.value)} placeholder="Σημείωση…" style={{width:'100%',marginTop:6,background:C.s2,border:`1px solid ${C.br}`,borderRadius:6,padding:'8px 10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/>}
        </div>

        {/* Driver event day */}
        {(m.CanDrive===true||m.CanDrive==='true')&&<div style={{marginBottom:10}}>
          <Toggle label={`Οδηγεί (event day +20€)`} checked={rm.driverEvent||false} onChange={v=>set_('driverEvent',v)}/>
        </div>}

        {/* Travel */}
        <div style={{padding:'8px 12px',background:C.s2,borderRadius:8,marginBottom:10,display:'flex',justifyContent:'space-between'}}>
          <Mono s c={C.mu}>Travel fee ({travelPrefectures} νομοί ×20€)</Mono>
          <Mono s c={travelPrefectures>0?C.ac:C.mu} style={{fontWeight:travelPrefectures>0?700:400}}>{travelPrefectures>0?'+'+fees.travel+'€':'εντός ΘΚ'}</Mono>
        </div>

        {/* Setup date */}
        {hasSetup&&<div style={{marginBottom:8}}>
          <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>📦 ΗΜΕΡΑ ΣΤΗΣΙΜΑΤΟΣ</Mono>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type="date" value={rm.setupDate||''} onChange={e=>set_('setupDate',e.target.value)} style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'8px 10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/>
            {setupDiff?<Mono s c={C.ac}>≠ event +40€</Mono>:<Mono s c={C.mu}>= event day</Mono>}
          </div>
          {setupDiff&&(m.CanDrive===true||m.CanDrive==='true')&&<div style={{marginTop:6}}>
            <Toggle label="Οδηγεί (setup day +20€)" checked={rm.driverSetup||false} onChange={v=>set_('driverSetup',v)}/>
          </div>}
        </div>}

        {/* Teardown date */}
        {hasTeardown&&<div>
          <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>📤 ΗΜΕΡΑ ΜΑΖΕΜΑΤΟΣ</Mono>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type="date" value={rm.teardownDate||''} onChange={e=>set_('teardownDate',e.target.value)} style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'8px 10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/>
            {tdDiff?<Mono s c={C.ac}>≠ event +40€</Mono>:<Mono s c={C.mu}>= event day</Mono>}
          </div>
          {tdDiff&&(m.CanDrive===true||m.CanDrive==='true')&&<div style={{marginTop:6}}>
            <Toggle label="Οδηγεί (teardown day +20€)" checked={rm.driverTeardown||false} onChange={v=>set_('driverTeardown',v)}/>
          </div>}
        </div>}
        {/* Extra roles for this member */}
        {(rm.extraRoles||[]).map((er,eri)=><div key={eri} style={{marginTop:10,padding:'10px 12px',background:C.s2,borderRadius:8,border:`1px solid ${C.ac}44`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <Mono s c={C.ac} style={{letterSpacing:1}}>+ ΡΟΛΟΣ {eri+1}</Mono>
            <button onClick={()=>set_('extraRoles',(rm.extraRoles||[]).filter((_,j)=>j!==eri))} style={{background:'none',border:'none',color:C.er,cursor:'pointer',fontSize:16}}>×</button>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
            {ALL_ROLES.map(r=><button key={r} onClick={()=>set_('extraRoles',(rm.extraRoles||[]).map((x,j)=>j===eri?{...x,role:r}:x))} style={{background:er.role===r?C.ac:'transparent',color:er.role===r?'#000':C.mu,border:`1px solid ${er.role===r?C.ac:C.br}`,borderRadius:6,padding:'3px 8px',fontSize:10,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>{r}</button>)}
          </div>
          {er.role==='Other'&&<div style={{display:'flex',gap:8,marginBottom:6}}>
            <div style={{flex:2}}><Inp label="Περιγραφή" value={er.desc||''} onChange={v=>set_('extraRoles',(rm.extraRoles||[]).map((x,j)=>j===eri?{...x,desc:v}:x))}/></div>
            <div style={{flex:1}}><Inp label="Αμοιβή €" value={er.fee||''} onChange={v=>set_('extraRoles',(rm.extraRoles||[]).map((x,j)=>j===eri?{...x,fee:v}:x))} type="number"/></div>
          </div>}
          <Mono s c={C.mu}>Αμοιβή: {er.role==='Other'?Number(er.fee||0):ROLE_FEES[er.role]||0}€</Mono>
        </div>)}
        <button onClick={()=>set_('extraRoles',[...(rm.extraRoles||[]),{role:'Setup Block',fee:'',desc:''}])} style={{width:'100%',marginTop:8,background:'none',border:`1px dashed ${C.br}`,color:C.mu,borderRadius:8,padding:'8px',fontFamily:'inherit',fontSize:12,cursor:'pointer'}}>+ Επιπλέον Ρόλος</button>
      </Card>);
    })}

    {/* Fee summary */}}
    <Card style={{marginBottom:16}}>
      {picked?.members.map(m=>{
        const rm=roleMap[m.CollabID]||{};
        const role=rm.role||'AV Tech';
        const fees=calcMemberFee_(role,travelPrefectures,rm.driverEvent,rm.setupDate,rm.teardownDate,ev.Date,rm.driverSetup,rm.driverTeardown);
        const base=role==='Other'?Number(rm.otherFee||0):fees.base;
        const memberTotal=base+fees.travel+fees.drEv+fees.setupFee+fees.tdFee;
        const extraTotal=(rm.extraRoles||[]).reduce((s,er)=>s+(er.role==='Other'?Number(er.fee||0):(ROLE_FEES[er.role]||0)),0);
        const label=role==='Other'&&rm.otherDesc?rm.otherDesc:role;
        return(<div key={m.CollabID} style={{padding:'6px 0',borderBottom:`1px solid ${C.br}`}}>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <Mono s c={C.mu}>{m.Name} <span style={{color:C.tx}}>{label}</span>{(rm.extraRoles||[]).length>0?<span style={{color:C.wa}}> +{(rm.extraRoles||[]).length}ρόλοι</span>:null}</Mono>
            <Mono s c={C.ac} style={{fontWeight:700}}>{memberTotal+extraTotal}€</Mono>
          </div>
        </div>);
      })}
      <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,marginTop:4}}>
        <Mono s c={C.mu} style={{fontWeight:700}}>Σύνολο Crew</Mono>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:C.ac}}>{totalStep3}€</div>
      </div>
    </Card>

    <StickyBar>
      <BigBtn onClick={doSaveAll} disabled={saving}>{saving?'Αποθήκευση…':'Αποθήκευση Crew ✓'}</BigBtn>
    </StickyBar>
  </div>);
}

// ─── RIDER PANEL ────────────────────────────────────────────────────────
function RiderPanel({auth,ev,warehouse,onDone,onBack}){
  const [avail,setAvail]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState({}); // typeCode → qty
  const [catF,setCatF]=useState('');
  const [search,setSearch]=useState('');
  const [saving,setSaving]=useState(false);
  const [pkgSuggestions,setPkgSuggestions]=useState([]); // [{typeCode,name,qty}]
  const [pkgDismissed,setPkgDismissed]=useState(new Set());
  const {msg,show}=useMsg();
  const [addToWH,setAddToWH]=useState(false);
  const [whForm,setWhForm]=useState({category:'PA',typeCode:'',name:'',qty:1,notes:''});

  useEffect(()=>{
    call('getWarehouseWithAvailability',auth.pin,ev.Date||'')
      .then(setAvail).finally(()=>setLoading(false));
  },[]);

  // Recalculate package suggestions ONLY when sel changes from user input
  // Use a ref to track accepted typeCodes so they don't re-trigger
  const [pkgCalcKey,setPkgCalcKey]=useState(0);
  const manualSelChange=useRef(false);

  useEffect(()=>{
    if(!manualSelChange.current)return;
    manualSelChange.current=false;
    const selections=Object.entries(sel).map(([typeCode,qty])=>({typeCode,qty}));
    if(!selections.length){setPkgSuggestions([]);return;}
    call('calcPackageSuggestions',auth.pin,selections)
      .then(sugg=>{
        const assigned=new Set((ev.equipment||[]).map(e=>e.TypeCode));
        // Show suggestions even if already in rider (user might want MORE)
        // Only hide if dismissed
        setPkgSuggestions(sugg.filter(s=>!pkgDismissed.has(s.typeCode)));
      }).catch(()=>{});
  },[pkgCalcKey]);

  const setQty=(typeCode,qty,max)=>{
    if(qty<=0){const n={...sel};delete n[typeCode];setSel(n);manualSelChange.current=true;setPkgCalcKey(k=>k+1);return;}
    setSel(s=>({...s,[typeCode]:Math.min(qty,max)}));
    manualSelChange.current=true;setPkgCalcKey(k=>k+1);
  };

  const acceptPkg=(pkg)=>{
    // Accept without triggering recalculation
    setSel(s=>({...s,[pkg.typeCode]:(s[pkg.typeCode]||0)+pkg.qty}));
    setPkgSuggestions(p=>p.filter(x=>x.typeCode!==pkg.typeCode));
  };

  const acceptAllPkgs=()=>{
    const newSel={...sel};
    pkgSuggestions.forEach(pkg=>{newSel[pkg.typeCode]=(newSel[pkg.typeCode]||0)+pkg.qty;});
    setSel(newSel);
    setPkgSuggestions([]);
  };

  const dismissPkg=(typeCode)=>{
    setPkgDismissed(s=>new Set([...s,typeCode]));
    setPkgSuggestions(p=>p.filter(x=>x.typeCode!==typeCode));
  };

  const doSave=async()=>{
    setSaving(true);
    try{
      // Parallel calls for speed
      await Promise.all(Object.entries(sel).map(([typeCode,qty])=>
        call('assignEquipment',auth.pin,ev.EventID,typeCode,qty,'')
      ));
      await onDone();
    }catch(e){show('❌ '+e.message);setSaving(false);}
  };

  const doRemove=async rowId=>{try{await call('removeEquipment',auth.pin,rowId);await onDone();}catch(e){show('❌ '+e.message);}};
  const assignedTypes=new Set((ev.equipment||[]).map(e=>e.TypeCode));

  // Build typeCode→name from avail for package display
  const typeNames={};
  (avail||[]).forEach(g=>{typeNames[g.typeCode]=g.name;});

  const filtered=(avail||[]).filter(g=>{
    const matchCat=!catF||g.category===catF;
    const matchSearch=!search||(g.name||'').toLowerCase().includes(search.toLowerCase())||(g.typeCode||'').toLowerCase().includes(search.toLowerCase());
    return matchCat&&matchSearch;
  });

  return(<div style={{padding:'24px 24px 120px'}} className="fade">
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <BackBtn onClick={onBack}/>
      <div style={{flex:1}}><div style={{fontSize:20,fontWeight:800}}>Rider Εξοπλισμός</div><Mono s c={C.mu}>{ev.Name}</Mono></div>
      <button onClick={()=>setAddToWH(true)} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:8,padding:'6px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',flexShrink:0}}>+ Αποθήκη</button>
    </div>
    <Toast msg={msg}/>

    {/* Quick-add to warehouse from Rider */}
    {addToWH&&<div style={{position:'fixed',inset:0,background:'#000a',zIndex:100,display:'flex',alignItems:'flex-end'}}>
      <div style={{background:C.s1,borderRadius:'16px 16px 0 0',padding:20,width:'100%'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontWeight:700}}>Προσθήκη στην Αποθήκη</div>
          <button onClick={()=>setAddToWH(false)} style={{background:'none',border:'none',color:C.mu,fontSize:22,cursor:'pointer'}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Inp label="Κατηγορία" value={whForm.category} onChange={v=>setWhForm(f=>({...f,category:v,typeCode:(({'PA':'SPK','Monitor':'MON','Lights':'LGT','Booth/Control':'CTL','Cabling':'CBL','Stage':'STG','Stands':'STD','Effects':'EFX','Other':'OTH'})[v]||'OTH')+'_'+(f.name||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,12)}))} options={EQ_CATS}/>
          <Inp label="Όνομα *" value={whForm.name} onChange={v=>setWhForm(f=>({...f,name:v,typeCode:(({'PA':'SPK','Monitor':'MON','Lights':'LGT','Booth/Control':'CTL','Cabling':'CBL','Stage':'STG','Stands':'STD','Effects':'EFX','Other':'OTH'})[f.category]||'OTH')+'_'+v.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,12)}))} placeholder="π.χ. RCF ART 915A"/>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:2}}><Mono s c={C.mu} style={{marginBottom:4,letterSpacing:2}}>TYPE CODE</Mono>
            <input value={whForm.typeCode} onChange={e=>setWhForm(f=>({...f,typeCode:e.target.value.toUpperCase().replace(/[^A-Z0-9_]/g,'')}))} style={{width:'100%',background:C.s2,border:`1px solid ${C.ac}44`,borderRadius:8,padding:'10px',color:C.ac,fontFamily:"'DM Mono',monospace",fontSize:12,outline:'none',letterSpacing:1}}/></div>
            <div style={{flex:1}}><Inp label="Τεμ." value={whForm.qty} onChange={v=>setWhForm(f=>({...f,qty:parseInt(v)||1}))} type="number"/></div>
          </div>

        <Inp label="Κατηγορία" value={incForm.category} onChange={v=>setIncForm(f=>({...f,category:v}))} options={INC_CATS}/>

// ─── CREW ASSIGN ROW (with swap) ─────────────────────────────────────────
function CrewAssignRow({auth,a,ev,collabs,busyMap,onRefresh,isPM}){
  const [swapping,setSwapping]=useState(false);
  const [saving,setSaving]=useState(false);
  const {msg,show}=useMsg();

  const assignedIds=new Set((ev.assignments||[]).map(x=>x.CollabID));
  // Filter swap candidates: not in this event, not busy on same date
  const available=collabs.filter(c=>{
    if(!c.Active||c.Active==='false') return false;
    if(assignedIds.has(c.CollabID)) return false;
    if(ev.Date && (busyMap[c.CollabID]||[]).includes(ev.Date)) return false;
    return true;
  });
  const KPI_KEYS=['K1','K2','K3','K4','K5'];
  const KPI_SHORT={K1:'P',K2:'B',K3:'A',K4:'T',K5:'D'};
  const kpiColor=v=>v>=4?C.ok:v>=3?C.wa:C.er;

  const doSwap=async(newCollab)=>{
    setSaving(true);
    try{
      const oldCollabId=a.CollabID;
      await call('removeAssignment',auth.pin,a.RowID);
      await call('assignCrew',auth.pin,ev.EventID,newCollab.CollabID,a.AssignedRole,
        Number(a.BaseFee),Number(a.TravelFee),Number(a.DriverFee),
        a.IsOverride==='true',a.OverrideNote||'',
        a.SetupDate||'',Number(a.SetupFee||0),a.TeardownDate||'',Number(a.TeardownFee||0)
      );
      // Send removal email silently (don't fail swap if email fails)
      call('sendSwapRemovalEmail',auth.pin,ev.EventID,oldCollabId).catch(()=>{});
      show('✅ Swap: '+newCollab.Name);setSwapping(false);await onRefresh();
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  return(<div style={{borderBottom:`1px solid ${C.br}`}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0'}}>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,fontSize:13}}>{a.collabName}{a.IsOverride==='true'?<span style={{color:C.wa,fontSize:11}}> ⚠</span>:null}</div>
        <Mono s c={C.mu}>{a.AssignedRole}{Number(a.DriverFee)>0?' · 🚐':''}{a.SetupDate&&a.SetupDate!==ev.Date?' · setup '+fmtDate(a.SetupDate):''}{a.TeardownDate&&a.TeardownDate!==ev.Date?' · teardown '+fmtDate(a.TeardownDate):''}</Mono>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        {isPM&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.ac}}>{Number(a.TotalFee)}€</div>}
        {!['true','FINALIZED',true].includes(a.Finalized)&&<button onClick={()=>setSwapping(s=>!s)} style={{background:swapping?C.ac+'22':'none',border:`1px solid ${swapping?C.ac:C.br}`,color:swapping?C.ac:C.mu,borderRadius:6,padding:'4px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',fontWeight:700}}>⇄ SWAP</button>}
      </div>
    </div>
    <Toast msg={msg}/>
    {swapping&&<div style={{padding:'10px 0 14px'}}>
      <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:1}}>ΕΠΙΛΕΞΕ ΑΝΤΙΚΑΤΑΣΤΑΣΗ</Mono>
      {available.length===0&&<Mono s c={C.er}>Δεν υπάρχουν διαθέσιμοι.</Mono>}
      {available.sort((a,b)=>(Number(b.OverallKPI)||0)-(Number(a.OverallKPI)||0)).map(c=>(
        <div key={c.CollabID} onClick={()=>!saving&&doSwap(c)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.br}`,background:C.s2,marginBottom:6,cursor:'pointer'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{c.Name}{(c.CanDrive===true||c.CanDrive==='true')?' 🚐':''}</div>
            <Mono s c={C.mu}>{(c.PrimaryRoles||'').split(',').filter(Boolean).slice(0,2).join(' · ')||'—'}</Mono>
          </div>
          <div style={{display:'flex',gap:3}}>
            {KPI_KEYS.map(k=>{const v=Number(c[k])||0;const col=kpiColor(v);return(
              <div key={k} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                <div style={{width:18,height:18,borderRadius:4,background:col+'22',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:700,color:col}}>{v||'?'}</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:C.mu}}>{KPI_SHORT[k]}</div>
              </div>);
            })}
          </div>
        </div>
      ))}
    </div>}
  </div>);
}

// ─── COLLAB SELF-VIEW ─────────────────────────────────────────────────────
function CollabView({auth,onLogout}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');
  const [viewEvent,setViewEvent]=useState(null);
  const [editProfile,setEditProfile]=useState(false);
  const [pf,setPf]=useState({name:'',phone:'',email:'',tShirtSize:'',newPin:'',newPinConfirm:''});
  const [showAvail,setShowAvail]=useState(false);
  const [newAvailDate,setNewAvailDate]=useState('');
  const [newAvailTo,setNewAvailTo]=useState('');
  const [unavailMode,setUnavailMode]=useState('single');
  const [saving,setSaving]=useState(false);
  const {msg,show}=useMsg();

  const load=useCallback(()=>{
    setLoading(true);
    call('getCollabView',auth.eventCode||auth.pin).then(d=>{
      setData(d);
      setPf({name:d.name||'',phone:d.phone||'',email:d.email||'',tShirtSize:d.tShirtSize||'',newPin:'',newPinConfirm:''});
    }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
  },[auth.pin]);

  useEffect(()=>{load();},[load]);

  const saveProfile=async()=>{
    if(pf.newPin&&pf.newPin!==pf.newPinConfirm){show('❌ Τα PIN δεν ταιριάζουν');return;}
    setSaving(true);
    const payload={name:pf.name,phone:pf.phone,email:pf.email,tShirtSize:pf.tShirtSize};
    if(pf.newPin) payload.newPin=pf.newPin;
    try{await call('updateCollabProfile',auth.eventCode||auth.pin,payload);show('Αποθηκεύτηκε');setEditProfile(false);load();}
    catch(e){show('Σφάλμα: '+e.message);}
    setSaving(false);
  };

  const unavailArr=(data?.UnavailableDates||'').split(',').filter(Boolean);
  const addUnavail=async()=>{
    if(!newAvailDate)return;
    const entry=unavailMode==='range'&&newAvailTo&&newAvailTo>newAvailDate?newAvailDate+':'+newAvailTo:newAvailDate;
    const next=[...new Set([...unavailArr,entry])].sort();
    try{await call('updateCollabProfile',auth.eventCode||auth.pin,{unavailableDates:next});setNewAvailDate('');setNewAvailTo('');load();show('✅ Αποθηκεύτηκε');}
    catch(e){show('❌ '+e.message);}
  };
  const removeUnavail=async d=>{
    const next=unavailArr.filter(x=>x!==d);
    try{await call('updateCollabProfile',auth.eventCode||auth.pin,{unavailableDates:next});load();}catch(e){show('❌ '+e.message);}
  };
  const fmtUnavailEntry=e=>{if(e.includes(':')){ const [f,t]=e.split(':'); return fmtDate(f)+' → '+fmtDate(t); } return fmtDate(e);};

  const [svcModalOpen,setSvcModalOpen]=useState(false);

  const openCollabSvc=async()=>{
    try{const w=await call('getWarehouse',auth.eventCode||auth.pin);
      const flat=[];(w||[]).forEach(g=>g.units.forEach(u=>flat.push({itemId:u.itemId,unitCode:u.unitCode,typeCode:g.typeCode,name:g.name,category:g.category,notes:u.notes||''})));
      setSvcWarehouse(flat);setSvcModalOpen(true);}
    catch(e){}
  };
  const doCollabSvc=async()=>{
    const key=auth.eventCode||auth.pin;
    try{
      if(svcCollabForm.isVehicle||svcCollabForm.vehicleId){
        if(!svcCollabForm.vehicleId){alert('Επίλεξε όχημα');return;}
        await call('addVehicleServiceFromTech',key,{vehicleId:svcCollabForm.vehicleId,description:svcCollabForm.description,notes:svcCollabForm.notes});
      } else {
        if(!svcCollabForm.selectedUnitId){alert('Επίλεξε τεμάχιο');return;}
        await call('addEquipmentService',key,{itemId:svcCollabForm.selectedUnitId,description:svcCollabForm.description,notes:svcCollabForm.notes});
      }
      setSvcModalOpen(false);setSvcCollabForm({description:'',notes:'',vehicleId:'',selectedUnitId:'',selCat:'',selType:'',selUnit:'',isVehicle:false});
      show('✅ Βλάβη καταχωρήθηκε');
    }catch(e){show('❌ '+e.message);}
  };
  const kpiColor=!data?C.mu:data.overallKPI>=4?C.ok:data.overallKPI>=3?C.wa:C.er;

  if(viewEvent) return <TechView auth={{...auth,pin:auth.eventCode||auth.pin,viewEventId:viewEvent.eventId}} onLogout={()=>setViewEvent(null)} readOnly={true}/>;
  if(loading)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><Spin/></div>;
  if(!data)return<div style={{padding:40,color:C.er,textAlign:'center'}}>{err||'Σφάλμα'}</div>;

  return(<div style={{minHeight:'100vh',paddingBottom:30}}>
    <Toast msg={msg}/>
    {svcModalOpen&&<ServiceReportModal allUnits={svcWarehouse} form={svcCollabForm} setForm={setSvcCollabForm} onClose={()=>setSvcModalOpen(false)} onSubmit={doCollabSvc}/>}
    <div style={{background:C.s1,borderBottom:`1px solid ${C.br}`,padding:'20px 24px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <Mono s c={C.mu} style={{marginBottom:4,letterSpacing:3}}>NDT OPERATIONS</Mono>
          <div style={{fontSize:26,fontWeight:800,letterSpacing:-0.5}}>{data.name}</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={openCollabSvc} style={{background:C.er+'22',border:`1px solid ${C.er}44`,color:C.er,borderRadius:8,padding:'6px 12px',fontFamily:'inherit',fontSize:12,cursor:'pointer',fontWeight:700}}>Βλάβη</button>
          <button onClick={()=>setEditProfile(e=>!e)} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:8,padding:'6px 12px',fontFamily:'inherit',fontSize:12,cursor:'pointer'}}>Επεξ.</button>
          <button onClick={onLogout} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:8,padding:'6px 12px',fontFamily:'inherit',fontSize:12,cursor:'pointer'}} className="np">Έξοδος</button>
        </div>
      </div>
      {editProfile&&<div style={{marginTop:14,display:'flex',flexDirection:'column',gap:10}}>
        <Inp label="Όνομα" value={pf.name} onChange={v=>setPf(f=>({...f,name:v}))}/>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><Inp label="Τηλέφωνο" value={pf.phone} onChange={v=>setPf(f=>({...f,phone:v}))}/></div>
          <div style={{flex:1}}><Inp label="Email" value={pf.email} onChange={v=>setPf(f=>({...f,email:v}))}/></div>
        </div>
        <div><Mono s c={C.mu} style={{marginBottom:6,letterSpacing:2}}>T-SHIRT</Mono>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{TSHIRT_SIZES.map(s=><button key={s} onClick={()=>setPf(f=>({...f,tShirtSize:s}))} style={{background:pf.tShirtSize===s?C.ac:'transparent',color:pf.tShirtSize===s?'#000':C.mu,border:`1px solid ${pf.tShirtSize===s?C.ac:C.br}`,borderRadius:6,padding:'5px 10px',fontSize:12,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>{s}</button>)}</div></div>
        <div style={{borderTop:`1px solid ${C.br}`,paddingTop:10}}>
          <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>ΑΛΛΑΓΗ PIN (προαιρετικό)</Mono>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Inp label="Νέο PIN" value={pf.newPin} onChange={v=>setPf(f=>({...f,newPin:v}))} type="number" placeholder="4+ ψηφία"/></div>
            <div style={{flex:1}}><Inp label="Επιβεβαίωση PIN" value={pf.newPinConfirm} onChange={v=>setPf(f=>({...f,newPinConfirm:v}))} type="number" placeholder="Ξανά"/></div>
          </div>
          {pf.newPin&&pf.newPinConfirm&&pf.newPin!==pf.newPinConfirm&&<Mono s c={C.er} style={{marginTop:4}}>Τα PIN δεν ταιριάζουν</Mono>}
        </div>
        <Btn onClick={saveProfile} disabled={saving} accent>{saving?'...':'Αποθήκευση'}</Btn>
      </div>}
      <div style={{marginTop:16,display:'flex',gap:12,alignItems:'center'}}>
        <div style={{background:C.s2,borderRadius:10,padding:'10px 16px',flex:1,textAlign:'center'}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:32,fontWeight:700,color:kpiColor}}>{data.overallKPI.toFixed(2)}</div>
          <Mono s c={C.mu}>Overall KPI</Mono>
        </div>
        <div style={{background:C.s2,borderRadius:10,padding:'10px 16px',flex:1,textAlign:'center'}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:32,fontWeight:700,color:C.ac}}>{data.totalEarned}</div>
          <Mono s c={C.mu}>Κερδισμένα €</Mono>
        </div>
      </div>
    </div>
    <div style={{padding:'20px 24px'}}>
      <div style={{marginBottom:20}}>
        <Mono s c={C.mu} style={{marginBottom:10,letterSpacing:2}}>ΕΠΕΡΧΟΜΕΝΑ · {data.upcoming.length}</Mono>
        {data.upcoming.length===0?<Mono s c={C.mu}>Δεν υπάρχουν επερχόμενα events</Mono>:
          data.upcoming.map((ev,i)=><Card key={i} style={{marginBottom:8,cursor:'pointer'}} onClick={()=>setViewEvent({eventId:ev.eventId})}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>

                <div style={{display:'flex',gap:8,marginTop:2,flexWrap:'wrap'}}>
                  <Mono s c={C.mu}>{fmtDate(ev.eventDate)}{ev.eventVenue?' · '+ev.eventVenue:''}</Mono>
                  <Mono s c={C.ac} style={{letterSpacing:2}}>{ev.eventCode}</Mono>
                </div>
                <Mono s c={C.mu} style={{marginTop:2}}>{ev.role}</Mono>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:C.ac}}>{ev.estimatedFee}€</div>

              </div>
            </div>

          <button onClick={()=>setShowAvail(a=>!a)} style={{background:'none',border:`1px solid ${C.br}`,color:C.ac,borderRadius:6,padding:'4px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer'}}>{showAvail?'ΚΛΕΙΣΙΜΟ':'+ ΠΡΟΣΘΗΚΗ'}</button>
        </div>
        {showAvail&&<div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12,padding:'12px',background:C.s2,borderRadius:10}}>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setUnavailMode('single')} style={{flex:1,background:unavailMode==='single'?C.ac:'transparent',color:unavailMode==='single'?'#000':C.mu,border:`1px solid ${unavailMode==='single'?C.ac:C.br}`,borderRadius:6,padding:'6px',fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer'}}>Μία μέρα</button>
            <button onClick={()=>setUnavailMode('range')} style={{flex:1,background:unavailMode==='range'?C.ac:'transparent',color:unavailMode==='range'?'#000':C.mu,border:`1px solid ${unavailMode==='range'?C.ac:C.br}`,borderRadius:6,padding:'6px',fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer'}}>Εύρος</button>
          </div>
          <input type="date" value={newAvailDate} onChange={e=>setNewAvailDate(e.target.value)} style={{width:'100%',background:C.bg,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/>
          {unavailMode==='range'&&<input type="date" value={newAvailTo} min={newAvailDate} onChange={e=>setNewAvailTo(e.target.value)} style={{width:'100%',background:C.bg,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/>}
          <Btn onClick={addUnavail} disabled={!newAvailDate} accent>Προσθήκη</Btn>
        </div>}
        {unavailArr.length===0?<Mono s c={C.mu}>Δεν υπάρχει δηλωμένη αδιαθεσία</Mono>:
          unavailArr.map(d=><div key={d} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',marginBottom:4,background:C.s2,borderRadius:8,border:`1px solid ${C.er}33`}}>
            <Mono s c={C.er}>{fmtUnavailEntry(d)}</Mono>
            <button onClick={()=>removeUnavail(d)} style={{background:'none',border:'none',color:C.er,cursor:'pointer',fontSize:18,padding:'0 4px'}}>×</button>
          </div>)
        }
      </div>
    </div>
  </div>);
}
function CollabDetail({auth,collabId,onBack}){

    setData(d);
    setKpiForm({k1:d.K1,k2:d.K2,k3:d.K3,k4:d.K4,k5:d.K5,k1w:d.K1_W,k2w:d.K2_W,k3w:d.K3_W,k4w:d.K4_W,collabPin:d.CollabPIN});
    setProfileForm({name:d.Name,email:d.Email,phone:d.Phone,canDrive:(d.CanDrive===true||d.CanDrive==='true'),hasKeys:(d.HasKeys===true||d.HasKeys==='true'),primaryRoles:(d.PrimaryRoles||'').split(',').filter(Boolean),notes:d.Notes||'',tShirtSize:d.TShirtSize||''});
  }).finally(()=>setLoading(false)),[auth.pin,collabId]);

      ? newDate+':'+newDateTo  // range format
      : newDate;               // single date
