            <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>PRIMARY ROLES</Mono>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {ALL_ROLES.map(r=><button key={r} onClick={()=>toggleRole(r)} style={{background:profileForm.primaryRoles?.includes(r)?C.ac:'transparent',color:profileForm.primaryRoles?.includes(r)?'#000':C.mu,border:`1px solid ${profileForm.primaryRoles?.includes(r)?C.ac:C.br}`,borderRadius:6,padding:'5px 10px',fontSize:11,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>{r}</button>)}
            </div>
          </div>
          <Toggle label="Μπορεί να οδηγεί" checked={profileForm.canDrive||false} onChange={v=>setProfileForm(f=>({...f,canDrive:v}))}/>
          <Toggle label="Έχει κλειδιά" checked={profileForm.hasKeys||false} onChange={v=>setProfileForm(f=>({...f,hasKeys:v}))}/>
          <div><Mono s c={C.mu} style={{marginBottom:6,letterSpacing:2}}>T-SHIRT</Mono>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{TSHIRT_SIZES.map(s=><button key={s} onClick={()=>setProfileForm(f=>({...f,tShirtSize:s}))} style={{background:profileForm.tShirtSize===s?C.ac:'transparent',color:profileForm.tShirtSize===s?'#000':C.mu,border:`1px solid ${profileForm.tShirtSize===s?C.ac:C.br}`,borderRadius:6,padding:'4px 8px',fontSize:11,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>{s}</button>)}</div></div>
          <Btn onClick={saveProfile} disabled={savingProfile} accent>{savingProfile?'…':'Αποθήκευση'}</Btn>
        </div>
      ):(
        <div style={{marginTop:4}}>
          {data.Email&&<Mono s c={C.mu} style={{marginBottom:2}}>{data.Email}</Mono>}
          {data.Phone&&<Mono s c={C.mu}>{data.Phone}</Mono>}
        </div>
      )}
    </Card>

    {/* KPI Card */}
    <Card style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <Mono s c={C.mu} style={{letterSpacing:2}}>KPI SCORES</Mono>
        <button onClick={()=>setEditKPI(e=>!e)} style={{background:'none',border:`1px solid ${C.br}`,color:C.ac,borderRadius:6,padding:'4px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer'}}>{editKPI?'ΚΛΕΙΣΙΜΟ':'ΕΠΕΞΕΡΓΑΣΙΑ'}</button>
      </div>
      {!editKPI?(
        <div>
          <div style={{display:'flex',gap:6,marginBottom:10}}>
            {[['K1','Punctuality',data.K1],['K2','Behaviour',data.K2],['K3','Adaptability',data.K3],['K4','Technical',data.K4],['K5','Availability',data.K5]].map(([k,label,val])=>{
              const v=Number(val)||0; const col=v>=4?C.ok:v>=3?C.wa:C.er;
              return<div key={k} style={{flex:1,background:C.s2,borderRadius:8,padding:'8px 4px',textAlign:'center'}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:col}}>{v.toFixed(2)}</div>
                <Mono s c={C.mu}>{k}</Mono>
              </div>;
            })}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:8,borderTop:`1px solid ${C.br}`}}>
            <Mono s c={C.mu}>Overall KPI · {Number(data.FeedbackCount)||0} feedbacks</Mono>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:overallColor}}>{overall.toFixed(2)}</div>
          </div>
          <div style={{marginTop:8,display:'flex',justifyContent:'space-between'}}>
            <Mono s c={C.mu}>PIN Συνεργάτη</Mono>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,color:C.ac,letterSpacing:4}}>{data.CollabPIN||'—'}</div>
          </div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {[['k1','K1 Punctuality'],['k2','K2 Behaviour'],['k3','K3 Adaptability'],['k4','K4 Technical'],['k5','K5 Availability (manual)']].map(([key,label])=>(
            <div key={key} style={{display:'flex',gap:10,alignItems:'center'}}>
              <div style={{flex:2}}><Mono s c={C.mu}>{label}</Mono></div>
              <input type="number" min="1" max="5" step="0.1" value={kpiForm[key]||3} onChange={e=>setKpiForm(f=>({...f,[key]:e.target.value}))} style={{width:60,background:C.s2,border:`1px solid ${C.br}`,borderRadius:6,padding:'6px 8px',color:C.tx,fontFamily:"'DM Mono',monospace",fontSize:14,outline:'none',textAlign:'center'}}/>
              {key!=='k5'&&<div style={{flex:2}}>
                <Mono s c={C.mu}>Weight</Mono>
                <input type="number" min="1" step="1" value={kpiForm[key+'w']||100} onChange={e=>setKpiForm(f=>({...f,[key+'w']:e.target.value}))} style={{width:70,background:C.s2,border:`1px solid ${C.br}`,borderRadius:6,padding:'6px 8px',color:C.mu,fontFamily:"'DM Mono',monospace",fontSize:12,outline:'none',textAlign:'center'}}/>
              </div>}
            </div>
          ))}
          <div style={{display:'flex',gap:10,alignItems:'center',marginTop:4}}>
            <Mono s c={C.mu} style={{flex:2}}>PIN (4ψήφιο)</Mono>
            <input type="text" maxLength="4" value={kpiForm.collabPin||''} onChange={e=>setKpiForm(f=>({...f,collabPin:e.target.value}))} style={{width:80,background:C.s2,border:`1px solid ${C.ac}44`,borderRadius:6,padding:'6px 8px',color:C.ac,fontFamily:"'DM Mono',monospace",fontSize:16,outline:'none',textAlign:'center',letterSpacing:4}}/>
          </div>
          <Btn onClick={saveKPI} disabled={savingKPI} accent>{savingKPI?'…':'Αποθήκευση'}</Btn>
        </div>
      )}
    </Card>

    <Card style={{marginBottom:16}}>
      <Mono s c={C.mu} style={{marginBottom:10,letterSpacing:2}}>BONUS ΠΕΡΙΟΔΟΣ {data.periodStart?.slice(0,7)} → {data.periodEnd?.slice(0,7)}</Mono>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <div style={{flex:1,background:C.s2,borderRadius:8,padding:'12px',textAlign:'center'}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:700,color:data.incidentCount>0?C.er:C.ok}}>{data.incidentCount}</div>
          <Mono s c={C.mu}>Incidents</Mono>
        </div>
        <div style={{flex:1,background:C.s2,borderRadius:8,padding:'12px',textAlign:'center'}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:700,color:bonusColor}}>{data.bonusPct}%</div>
          <Mono s c={C.mu}>Bonus %</Mono>
        </div>
        <div style={{flex:1,background:C.s2,borderRadius:8,padding:'12px',textAlign:'center'}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:700,color:C.ac}}>{data.bonusAmount}€</div>
          <Mono s c={C.mu}>Ποσό</Mono>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><Mono s c={C.mu}>Αμοιβές περιόδου</Mono><Mono s c={C.ac} style={{fontWeight:700}}>{data.periodEarnings}€</Mono></div>
      <div style={{display:'flex',justifyContent:'space-between'}}><Mono s c={C.mu}>Σύνολο αμοιβών (all time)</Mono><Mono s>{data.totalEarnings}€</Mono></div>
    </Card>

    {data.incidents?.length>0&&<div style={{marginBottom:16}}>
      <SecHdr title={'INCIDENTS ΠΕΡΙΟΔΟΥ · '+data.incidents.length}/>
      {data.incidents.map(i=><Card key={i.IncidentID} style={{marginBottom:8,border:`1px solid ${C.er}33`}}>
        <div style={{fontWeight:600,fontSize:13,color:C.er}}>{i.Category}</div>
        <Mono s c={C.mu}>{fmtDate(i.Date)} · {i.eventName}</Mono>
        {i.Description&&<div style={{fontSize:12,color:C.mu,marginTop:4}}>{i.Description}</div>}
      </Card>)}
    </div>}

    <div style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <Mono s c={C.mu} style={{letterSpacing:2}}>ΑΔΙΑΘΕΣΙΑ</Mono>
        <div style={{display:'flex',gap:4}}>
          {['single','range'].map(m=><button key={m} onClick={()=>setUnavailMode(m)} style={{background:unavailMode===m?C.ac:'transparent',color:unavailMode===m?'#000':C.mu,border:`1px solid ${unavailMode===m?C.ac:C.br}`,borderRadius:6,padding:'3px 8px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer',fontWeight:700}}>{m==='single'?'ΗΜΕΡΑ':'ΔΙΑΣΤΗΜΑ'}</button>)}
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:6,flex:1,alignItems:'center'}}>
          <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px 12px',color:C.tx,fontFamily:'inherit',fontSize:14,outline:'none'}}/>
          {unavailMode==='range'&&<>
            <Mono s c={C.mu}>→</Mono>
            <input type="date" value={newDateTo} onChange={e=>setNewDateTo(e.target.value)} min={newDate} style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px 12px',color:C.tx,fontFamily:'inherit',fontSize:14,outline:'none'}}/>
          </>}
        </div>
        <Btn onClick={addUnavail} disabled={!newDate||(unavailMode==='range'&&!newDateTo)}>+ Αδιαθεσία</Btn>
      </div>
      {unavailArr.length===0&&<Mono s c={C.mu}>Δεν υπάρχουν δηλωμένες αδιαθεσίες</Mono>}
      {unavailArr.map(d=><div key={d} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.br}`}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {d.includes(':')&&<Mono s c={C.wa}>📅</Mono>}
          <Mono>{fmtUnavailEntry(d)}</Mono>
        </div>
        <XBtn onClick={()=>removeUnavail(d)}/>
      </div>)}
    </div>

    {data.history?.length>0&&<div style={{marginBottom:16}}>
      <SecHdr title={'ΙΣΤΟΡΙΚΟ · '+data.history.length+' EVENTS'}/>
      {data.history.slice(0,20).map(h=><div key={h.RowID} style={{padding:'10px 0',borderBottom:`1px solid ${C.br}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontWeight:600,fontSize:13}}>{h.eventName}</div><Mono s c={C.mu}>{fmtDate(h.eventDate)} · {h.AssignedRole}</Mono></div>
        <div style={{textAlign:'right'}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.ac}}>{Number(h.TotalFee)}€</div>{['true','FINALIZED',true].includes(h.Finalized)&&<Mono s c={C.ok}>✓</Mono>}</div>
      </div>)}
    </div>}

    {(data.email||data.phone)&&<div style={{display:'flex',gap:8}}>
      {data.email&&<a href={'mailto:'+data.email} style={{...btnBase,flex:1,textAlign:'center',textDecoration:'none',display:'block'}}>📧 Email</a>}
      {data.phone&&<a href={'tel:'+data.phone} style={{...btnBase,flex:1,textAlign:'center',textDecoration:'none',display:'block'}}>📞 Κλήση</a>}
    </div>}
  </div>);
}

// ─── WAREHOUSE TAB ───────────────────────────────────────────────────────
function WarehouseTab({auth,warehouse,refresh}){
  const [adding,setAdding]=useState(false);
  const [search,setSearch]=useState('');
  const [f,setF]=useState({category:'PA',typeCode:'',name:'',qty:1,notes:''});
  const [saving,setSaving]=useState(false);
  const [detail,setDetail]=useState(null); // {typeCode, units} expanded view
  const [unitDetail,setUnitDetail]=useState(null); // single unit with history+service
  const [addService,setAddService]=useState(null);
  const [qrView,setQrView]=useState(null);
  const [svcForm,setSvcForm]=useState({date:todayStr(),description:'',resolvedDate:'',cost:'',notes:'',status:'active'});
  const {msg,show}=useMsg();

  const CAT_PFX={'PA':'SPK','Monitor':'MON','Lights':'LGT','Booth/Control':'CTL','Cabling':'CBL','Stage':'STG','Stands':'STD','Effects':'EFX','Other':'OTH'};
  const suggestTypeCode=(cat,name)=>{
    const pfx=CAT_PFX[cat]||'OTH';
    const sfx=(name||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,12);
    return sfx?pfx+'_'+sfx:pfx+'_';
  };

  const doAdd=async()=>{
    if(!f.name||!f.typeCode)return;
    setSaving(true);
    try{
      const r=await call('addEquipmentItem',auth.pin,f);
      show(`✅ ${r.count} τεμάχια προστέθηκαν · ${r.typeCode}`);
      setAdding(false);setF({category:'PA',typeCode:'',name:'',qty:1,notes:''});
      await refresh();
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  const doDeleteUnit=async(itemId)=>{
    if(!confirm('Διαγραφή τεμαχίου;'))return;
    try{await call('deleteEquipmentItem',auth.pin,itemId);await refresh();setDetail(null);}
    catch(e){show('❌ '+e.message);}
  };

  const loadUnitDetail=async(itemId)=>{
    try{const d=await call('getEquipmentUnitDetail',auth.pin,itemId);setUnitDetail(d);}
    catch(e){show('❌ '+e.message);}
  };

  const doAddService=async()=>{
    if(!svcForm.description||!addService)return;
    setSaving(true);
    try{
      await call('addEquipmentService',auth.pin,{itemId:addService,...svcForm});
      show('✅ Service καταχωρήθηκε');setAddService(null);
      setSvcForm({date:todayStr(),description:'',resolvedDate:'',cost:'',notes:'',status:'active'});
      await refresh();
      if(unitDetail?.ItemID===addService){const d=await call('getEquipmentUnitDetail',auth.pin,addService);setUnitDetail(d);}
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  // warehouse is now array of grouped types from server
  const filtered=(warehouse||[]).filter(g=>
    !search||(g.name||'').toLowerCase().includes(search.toLowerCase())||(g.typeCode||'').toLowerCase().includes(search.toLowerCase())
  );
  const grouped=filtered.reduce((a,g)=>{(a[g.category]=a[g.category]||[]).push(g);return a;},{});

  // Unit detail view
  if(unitDetail) return(
    <div style={{padding:24}} className="fade">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <BackBtn onClick={()=>setUnitDetail(null)}/>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:800}}>{unitDetail.Name}</div>
          <Mono s c={C.ac} style={{letterSpacing:2}}>{unitDetail.UnitCode}</Mono>
        </div>
        <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",padding:'3px 8px',borderRadius:4,fontWeight:700,
          background:unitDetail.Status==='active'?C.ok+'22':C.er+'22',
          color:unitDetail.Status==='active'?C.ok:C.er,
          border:`1px solid ${unitDetail.Status==='active'?C.ok:C.er}44`
        }}>{unitDetail.Status||'active'}</span>
      </div>
      <Toast msg={msg}/>

      {/* Service log */}
      <Card style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <Mono s c={C.mu} style={{letterSpacing:2}}>SERVICE / ΒΛΑΒΕΣ</Mono>
          <button onClick={()=>setAddService(addService===unitDetail.ItemID?null:unitDetail.ItemID)} style={{background:C.ac+'22',border:`1px solid ${C.ac}44`,color:C.ac,borderRadius:6,padding:'4px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',fontWeight:700}}>+ ΚΑΤΑΧΩΡΗΣΗ</button>
        </div>
        {addService===unitDetail.ItemID&&<div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14,padding:'12px',background:C.s2,borderRadius:8}}>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Mono s c={C.mu} style={{marginBottom:4}}>Ημερομηνία</Mono><input type="date" value={svcForm.date} onChange={e=>setSvcForm(f=>({...f,date:e.target.value}))} style={{width:'100%',background:C.bg,border:`1px solid ${C.br}`,borderRadius:6,padding:'8px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/></div>
            <div style={{flex:1}}><Mono s c={C.mu} style={{marginBottom:4}}>Επίλυση</Mono><input type="date" value={svcForm.resolvedDate} onChange={e=>setSvcForm(f=>({...f,resolvedDate:e.target.value}))} style={{width:'100%',background:C.bg,border:`1px solid ${C.br}`,borderRadius:6,padding:'8px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/></div>
          </div>
          <Inp label="Περιγραφή *" value={svcForm.description} onChange={v=>setSvcForm(f=>({...f,description:v}))} placeholder="π.χ. Αντικατάσταση tweeter"/>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Inp label="Κόστος (€)" value={svcForm.cost} onChange={v=>setSvcForm(f=>({...f,cost:v}))} type="number"/></div>
            <div style={{flex:1}}>
              <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>STATUS ΜΕΤΑ</Mono>
              <select value={svcForm.status} onChange={e=>setSvcForm(f=>({...f,status:e.target.value}))} style={{width:'100%',background:C.bg,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}>
                <option value="active">Active</option>
                <option value="service">Σε service</option>
                <option value="retired">Απόσυρση</option>
              </select>
            </div>
          </div>
          <Btn onClick={doAddService} disabled={saving||!svcForm.description} accent>{saving?'…':'Αποθήκευση'}</Btn>
        </div>}
        {(unitDetail.service||[]).length===0?<Mono s c={C.mu}>Δεν υπάρχουν καταχωρήσεις</Mono>:
          (unitDetail.service||[]).map(s=><div key={s.ServiceID} style={{padding:'8px 0',borderBottom:`1px solid ${C.br}`}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <div style={{fontWeight:600,fontSize:13}}>{s.Description}</div>
              {Number(s.Cost)>0&&<Mono s c={C.ac}>{s.Cost}€</Mono>}
            </div>
            <Mono s c={C.mu}>{fmtDate(s.Date)}{s.ResolvedDate?' → '+fmtDate(s.ResolvedDate):' (εκκρεμεί)'}</Mono>
          </div>)
        }
      </Card>

      {/* Event history */}
      <Card>
        <Mono s c={C.mu} style={{marginBottom:12,letterSpacing:2}}>ΙΣΤΟΡΙΚΟ ΧΡΗΣΗΣ</Mono>
        {(unitDetail.history||[]).length===0?<Mono s c={C.mu}>Δεν έχει χρησιμοποιηθεί ακόμα</Mono>:
          (unitDetail.history||[]).map((h,i)=><div key={i} style={{padding:'8px 0',borderBottom:`1px solid ${C.br}`}}>
            <div style={{fontWeight:600,fontSize:13}}>{h.eventName}</div>
            <Mono s c={C.mu}>{fmtDate(h.eventDate)}</Mono>
          </div>)
        }
      </Card>
    </div>
  );

  return(<div style={{padding:24}}>
    {qrView&&<QRModal code={qrView.code} name={qrView.name} onClose={()=>setQrView(null)}/>}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <div style={{fontSize:28,fontWeight:800,letterSpacing:-0.5}}>Αποθήκη</div>
      <button onClick={()=>{setAdding(a=>!a);}} style={{background:C.ac,color:'#000',border:'none',borderRadius:10,padding:'10px 18px',fontFamily:'inherit',fontWeight:800,fontSize:14,cursor:'pointer'}}>{adding?'Κλείσιμο':'+ Νέο'}</button>
    </div>
    <div style={{marginBottom:16}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Αναζήτηση ονόματος ή κωδικού…" style={{width:'100%',background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px 13px',color:C.tx,fontFamily:'inherit',fontSize:14,outline:'none'}}/>
    </div>
    <Toast msg={msg}/>
    {adding&&<div style={{position:'fixed',inset:0,background:'#000a',zIndex:100,display:'flex',alignItems:'flex-end'}}>
      <div style={{background:C.s1,borderRadius:'16px 16px 0 0',padding:20,width:'100%',maxHeight:'85vh',overflow:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
        <div style={{fontSize:16,fontWeight:700}}>Νέο Είδος Αποθήκης</div>
        <button onClick={()=>setAdding(false)} style={{background:'none',border:'none',color:C.mu,fontSize:22,cursor:'pointer'}}>×</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Inp label="Κατηγορία" value={f.category} onChange={v=>setF(x=>({...x,category:v,typeCode:suggestTypeCode(v,x.name)}))} options={EQ_CATS}/>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}><Inp label="Όνομα *" value={f.name} onChange={v=>setF(x=>({...x,name:v,typeCode:suggestTypeCode(x.category,v)}))}/></div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}>
            <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>ΚΩΔΙΚΟΣ ΕΙΔΟΥΣ (TypeCode)</Mono>
            <input value={f.typeCode} onChange={e=>setF(x=>({...x,typeCode:e.target.value.toUpperCase().replace(/[^A-Z0-9_]/g,'')}))} placeholder="π.χ. SPK_RCF915A" style={{width:'100%',background:C.s2,border:`1px solid ${C.ac}44`,borderRadius:8,padding:'11px 10px',color:C.ac,fontFamily:"'DM Mono',monospace",fontSize:12,outline:'none',letterSpacing:1}}/>
          </div>
          <div style={{flex:'0 0 90px'}}>
            <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>ΤΕΜΑΧΙΑ</Mono>
            <input type="number" min="1" max="100" value={f.qty} onChange={e=>setF(x=>({...x,qty:parseInt(e.target.value)||1}))} style={{width:'100%',background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'11px 10px',color:C.tx,fontFamily:"'DM Mono',monospace",fontSize:14,outline:'none',textAlign:'center'}}/>
          </div>
        </div>
        <Inp label="Σημειώσεις" value={f.notes} onChange={v=>setF(x=>({...x,notes:v}))}/>
        <Mono s c={C.mu}>→ Θα δημιουργηθούν {f.qty} τεμάχια: {f.typeCode||'???'}-001 … -{String(f.qty).padStart(3,'0')}</Mono>
        <Btn onClick={doAdd} disabled={saving||!f.name||!f.typeCode} accent>{saving?'…':'Προσθήκη'}</Btn>
      </div>
      </div>
    </div>}

    {filtered.length===0?<Empty text={search?'Δεν βρέθηκε αντικείμενο':'Η αποθήκη είναι άδεια'}/>:
      Object.entries(grouped).map(([cat,groups])=>(
        <div key={cat} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <div style={{width:28,height:2,background:CAT_C[cat]||C.mu,borderRadius:2}}/>
            <Mono s style={{color:CAT_C[cat]||C.mu,letterSpacing:2}}>{cat.toUpperCase()}</Mono>
          </div>
          {groups.map(g=>(
            <div key={g.typeCode} style={{marginBottom:8}}>
              <div onClick={()=>setDetail(detail===g.typeCode?null:g.typeCode)} style={{display:'flex',alignItems:'center',padding:'10px 12px',borderRadius:10,border:`1px solid ${detail===g.typeCode?C.ac:C.br}`,background:detail===g.typeCode?C.ac+'11':C.s1,cursor:'pointer'}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{g.name}</div>
                  <div style={{display:'flex',gap:8,marginTop:2}}>
                    <Mono s c={C.ac} style={{letterSpacing:1}}>{g.typeCode}</Mono>
                    <Mono s c={g.available>0?C.ok:C.er}>{g.available}/{g.total} διαθ.</Mono>
                  </div>
                </div>
                <Mono s c={C.mu}>{detail===g.typeCode?'▲':'▼'}</Mono>
              </div>
              {detail===g.typeCode&&<div style={{marginTop:4,paddingLeft:8}}>
                {g.units.map(u=>(
                  <div key={u.itemId} style={{display:'flex',alignItems:'center',padding:'8px 10px',borderRadius:8,border:`1px solid ${u.status==='active'?C.br:C.er+'44'}`,background:C.s2,marginBottom:4}}>
                    <div style={{flex:1}}>
                      <Mono s c={C.ac} style={{letterSpacing:1}}>{u.unitCode}</Mono>
                      {u.status!=='active'&&<Mono s c={C.er}>{u.status}</Mono>}
                    </div>
                    <button onClick={()=>setQrView({code:u.unitCode,name:u.unitCode})} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:6,padding:'3px 8px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer',marginRight:4}}>QR</button>
                    {'NDEFReader' in window&&<button onClick={async()=>{
                      try{
                        const ndef=new window.NDEFReader();
                        await ndef.write({records:[{recordType:'text',data:u.unitCode}]});
                        alert('✅ Γράφτηκε: '+u.unitCode);
                      }catch(e){alert('NFC write: '+e.message);}
                    }} style={{background:C.ac+'22',border:`1px solid ${C.ac}44`,color:C.ac,borderRadius:6,padding:'3px 8px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer',marginRight:4}}>NFC</button>}
                    <button onClick={()=>loadUnitDetail(u.itemId)} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:6,padding:'3px 8px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer',marginRight:4}}>ΙΣΤΟΡΙΚΟ</button>
                    <XBtn onClick={()=>doDeleteUnit(u.itemId)}/>
                  </div>
                ))}
                {/* + Τεμάχια button */}
                <div onClick={()=>setF(x=>({...x,typeCode:g.typeCode,name:g.name,category:g.category,qty:1}))&&setAdding(true)} style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'8px',borderRadius:8,border:`1px dashed ${C.br}`,cursor:'pointer',marginTop:4}} onClick={()=>{setF({category:g.category,typeCode:g.typeCode,name:g.name,qty:1,notes:''});setAdding(true);}}>
                  <Mono s c={C.mu}>+ Προσθήκη τεμαχίων σε {g.typeCode}</Mono>
                </div>
              </div>}
            </div>
          ))}
        </div>
      ))
    }
  </div>);
}

// ─── PACKAGES TAB (within Warehouse) ─────────────────────────────────────
function PackagesSection({auth,warehouse}){
  const [packages,setPackages]=useState([]);
  const [adding,setAdding]=useState(false);
  const [f,setF]=useState({triggerTypeCode:'',triggerQty:1,includedTypeCode:'',includedQty:1});
  const [saving,setSaving]=useState(false);
  const {msg,show}=useMsg();

  const load=useCallback(()=>call('getPackages',auth.pin).then(setPackages),[auth.pin]);
  useEffect(()=>{load();},[load]);

  // Build typeCode→name map from warehouse
  const typeNames={};
  (warehouse||[]).forEach(g=>{typeNames[g.typeCode]=g.name;});

  const doAdd=async()=>{
    if(!f.triggerTypeCode||!f.includedTypeCode)return;
    setSaving(true);
    try{
      await call('addPackage',auth.pin,{...f,triggerName:typeNames[f.triggerTypeCode]||f.triggerTypeCode,includedName:typeNames[f.includedTypeCode]||f.includedTypeCode});
      show('✅ Rule προστέθηκε');setAdding(false);setF({triggerTypeCode:'',triggerQty:1,includedTypeCode:'',includedQty:1});
      await load();
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };
  const doDelete=async id=>{try{await call('deletePackage',auth.pin,id);await load();}catch(e){show('❌ '+e.message);}};

  const typeOptions=[{value:'',label:'Επίλεξε είδος…'},...(warehouse||[]).map(g=>({value:g.typeCode,label:g.name+' ('+g.typeCode+')'}))];

  // Group by trigger for display
  const grouped={};
  packages.forEach(p=>{
    const k=p.TriggerTypeCode;
    if(!grouped[k])grouped[k]={triggerTypeCode:k,triggerName:p.TriggerName||typeNames[k]||k,rules:[]};
    grouped[k].rules.push(p);
  });

  return(<div style={{marginTop:32}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5}}>Packages / Sets</div>
      <button onClick={()=>setAdding(a=>!a)} style={{background:C.ac,color:'#000',border:'none',borderRadius:10,padding:'8px 14px',fontFamily:'inherit',fontWeight:800,fontSize:13,cursor:'pointer'}}>{adding?'Κλείσιμο':'+ Νέο Rule'}</button>
    </div>
    <Toast msg={msg}/>

    {adding&&<div style={{position:'fixed',inset:0,background:'#000a',zIndex:100,display:'flex',alignItems:'flex-end'}}>
      <div style={{background:C.s1,borderRadius:'16px 16px 0 0',padding:20,width:'100%',maxHeight:'88vh',overflow:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:16,fontWeight:700}}>Νέο Package Rule</div>
        <button onClick={()=>setAdding(false)} style={{background:'none',border:'none',color:C.mu,fontSize:22,cursor:'pointer'}}>×</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
          <div style={{flex:2}}><Inp label="Αν μπει (Trigger)" value={f.triggerTypeCode} onChange={v=>setF(x=>({...x,triggerTypeCode:v}))} options={typeOptions}/></div>
          <div style={{flex:'0 0 70px'}}><Inp label="× Ποσ." value={f.triggerQty} onChange={v=>setF(x=>({...x,triggerQty:parseInt(v)||1}))} type="number"/></div>
        </div>
        <Mono s c={C.mu} style={{textAlign:'center'}}>→ πρότεινε αυτόματα →</Mono>
        <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
          <div style={{flex:2}}><Inp label="Να προστεθεί (Included)" value={f.includedTypeCode} onChange={v=>setF(x=>({...x,includedTypeCode:v}))} options={typeOptions}/></div>
          <div style={{flex:'0 0 70px'}}><Inp label="× Ποσ." value={f.includedQty} onChange={v=>setF(x=>({...x,includedQty:parseInt(v)||1}))} type="number"/></div>
        </div>
        {f.triggerTypeCode&&f.includedTypeCode&&<div style={{padding:'8px 12px',background:C.s2,borderRadius:8,fontSize:12}}>
          Κάθε <strong>{f.triggerQty}× {typeNames[f.triggerTypeCode]||f.triggerTypeCode}</strong> → πρόσθεσε <strong>{f.includedQty}× {typeNames[f.includedTypeCode]||f.includedTypeCode}</strong>
        </div>}
        <Btn onClick={doAdd} disabled={saving||!f.triggerTypeCode||!f.includedTypeCode} accent>{saving?'…':'Αποθήκευση Rule'}</Btn>
      </div>
      </div>
    </div>}

    {packages.length===0?<Mono s c={C.mu}>Δεν υπάρχουν package rules ακόμα.</Mono>:
      Object.values(grouped).map(g=>(
        <Card key={g.triggerTypeCode} style={{marginBottom:10}}>
          <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:1}}>ΑΝ ΜΠΕΙ: <span style={{color:C.tx,fontWeight:700}}>{g.triggerName}</span></Mono>
          {g.rules.map(r=><div key={r.PackageID} style={{display:'flex',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${C.br}`}}>
            <div style={{flex:1}}>
              <span style={{fontSize:13}}>Κάθε <strong style={{color:C.wa}}>{r.TriggerQty}×</strong> → πρόσθεσε <strong style={{color:C.ok}}>{r.IncludedQty}× {r.IncludedName||typeNames[r.IncludedTypeCode]||r.IncludedTypeCode}</strong></span>
              <Mono s c={C.mu}>{r.IncludedTypeCode}</Mono>
            </div>
            <XBtn onClick={()=>doDelete(r.PackageID)}/>
          </div>)}
        </Card>
      ))
    }
  </div>);
}
// ─── SERVICE LOG TAB (Βλαβολόγιο) ────────────────────────────────────────
function ServiceLogTab({auth}){
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState('all'); // all | open | equipment | vehicle
  const [addForm,setAddForm]=useState(null); // null | 'equipment' | 'vehicle'
  const [vehicles,setVehicles]=useState([]);
  const [warehouse,setWarehouse]=useState([]);
  const [form,setForm]=useState({targetId:'',date:todayStr(),description:'',resolvedDate:'',cost:'',notes:''});
  const [saving,setSaving]=useState(false);
  const {msg,show}=useMsg();

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const [l,v,w]=await Promise.all([
        call('getAllServiceLog',auth.pin),
        call('getVehicles',auth.pin),
        call('getWarehouse',auth.pin),
      ]);
      setLogs(l||[]);setVehicles(v||[]);setWarehouse(w||[]);
    }catch(e){show('❌ '+e.message);}
    setLoading(false);
  },[auth.pin]);

  useEffect(()=>{load();},[load]);

  const doAdd=async()=>{
    if(!form.targetId||!form.description)return;
    setSaving(true);
    try{
      if(addForm==='equipment') await call('addEquipmentService',auth.pin,{itemId:form.targetId,...form});
      else await call('addVehicleService',auth.pin,{vehicleId:form.targetId,...form});
      show('✅ Καταχωρήθηκε');setAddForm(null);setForm({targetId:'',date:todayStr(),description:'',resolvedDate:'',cost:'',notes:''});
      await load();
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  const doDelete=async(s)=>{
    try{
      if(s.type==='equipment') await call('deleteEquipmentService',auth.pin,s.ServiceID);
      else await call('deleteVehicleService',auth.pin,s.ServiceID);
      await load();
    }catch(e){show('❌ '+e.message);}
  };

  const filtered=logs.filter(s=>{
    if(filter==='open') return !s.ResolvedDate;
    if(filter==='equipment') return s.type==='equipment';
    if(filter==='vehicle') return s.type==='vehicle';
    return true;
  });

  const openCount=logs.filter(s=>!s.ResolvedDate).length;

  // Build unit options for equipment selector
  const unitOptions=[{value:'',label:'Επίλεξε τεμάχιο…'},...(warehouse||[]).flatMap(g=>g.units.map(u=>({value:u.itemId,label:g.name+' · '+u.unitCode})))];
  const vehOptions=[{value:'',label:'Επίλεξε όχημα…'},...(vehicles||[]).map(v=>({value:v.VehicleID,label:v.Name+' · '+v.Plate}))];

  return(<div style={{padding:24}}>
    {/* Add modal */}
    {addForm&&<div style={{position:'fixed',inset:0,background:'#000a',zIndex:100,display:'flex',alignItems:'flex-end'}}>
      <div style={{background:C.s1,borderRadius:'16px 16px 0 0',padding:20,width:'100%',maxHeight:'88vh',overflow:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontWeight:700}}>{addForm==='equipment'?'Βλάβη Εξοπλισμού':'Βλάβη Οχήματος'}</div>
          <button onClick={()=>setAddForm(null)} style={{background:'none',border:'none',color:C.mu,fontSize:22,cursor:'pointer'}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Inp label={addForm==='equipment'?'Τεμάχιο':'Όχημα'} value={form.targetId} onChange={v=>setForm(f=>({...f,targetId:v}))} options={addForm==='equipment'?unitOptions:vehOptions}/>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Mono s c={C.mu} style={{marginBottom:4,letterSpacing:2}}>ΗΜΕΡΟΜΗΝΙΑ</Mono><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{width:'100%',background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/></div>
            <div style={{flex:1}}><Mono s c={C.mu} style={{marginBottom:4,letterSpacing:2}}>ΕΠΙΛΥΣΗ</Mono><input type="date" value={form.resolvedDate} onChange={e=>setForm(f=>({...f,resolvedDate:e.target.value}))} style={{width:'100%',background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/></div>
          </div>
          <Inp label="Περιγραφή *" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="π.χ. Σπασμένος tweeter, Βλάβη κινητήρα…"/>
          <Inp label="Κόστος (€)" value={form.cost} onChange={v=>setForm(f=>({...f,cost:v}))} type="number"/>
          <Inp label="Σημειώσεις" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))}/>
          <Btn onClick={doAdd} disabled={saving||!form.targetId||!form.description} accent>{saving?'…':'Καταχώρηση'}</Btn>
        </div>
      </div>
    </div>}

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <div>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:-0.5}}>Βλαβολόγιο</div>
        {openCount>0&&<Mono s c={C.er}>{openCount} εκκρεμείς βλάβες</Mono>}
      </div>
      <div style={{display:'flex',gap:6}}>
        <button onClick={()=>setAddForm('equipment')} style={{background:C.s2,border:`1px solid ${C.br}`,color:C.tx,borderRadius:8,padding:'8px 10px',fontFamily:'inherit',fontSize:12,cursor:'pointer'}}>+ Εξοπλισμός</button>
        <button onClick={()=>setAddForm('vehicle')} style={{background:C.s2,border:`1px solid ${C.br}`,color:C.tx,borderRadius:8,padding:'8px 10px',fontFamily:'inherit',fontSize:12,cursor:'pointer'}}>+ Όχημα</button>
      </div>
    </div>

    <Toast msg={msg}/>

    <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
      {[['all','Όλα'],['open','Εκκρεμείς'],['equipment','Εξοπλισμός'],['vehicle','Οχήματα']].map(([k,l])=>(
        <button key={k} onClick={()=>setFilter(k)} style={{background:filter===k?C.ac:'transparent',color:filter===k?'#000':C.mu,border:`1px solid ${filter===k?C.ac:C.br}`,borderRadius:8,padding:'5px 12px',fontFamily:'inherit',fontWeight:700,fontSize:12,cursor:'pointer'}}>{l}{k==='open'&&openCount>0?` (${openCount})`:''}</button>
      ))}
    </div>

    {loading?<div style={{textAlign:'center',padding:40}}><Spin/></div>:
    filtered.length===0?<Empty text="Δεν υπάρχουν καταχωρήσεις"/>:
    filtered.map(s=>(
      <div key={s.ServiceID} style={{background:C.s1,border:`1px solid ${!s.ResolvedDate?C.er+'44':C.br}`,borderRadius:12,padding:'12px 16px',marginBottom:8}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
              <span style={{fontSize:13,fontWeight:700}}>{s.displayName}</span>
              <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",padding:'2px 6px',borderRadius:4,background:s.type==='vehicle'?C.inf+'22':C.ac+'22',color:s.type==='vehicle'?C.inf:C.ac,border:`1px solid ${s.type==='vehicle'?C.inf+'44':C.ac+'44'}`}}>{s.type==='vehicle'?'ΟΧΗΜΑ':s.category}</span>
              {!s.ResolvedDate&&<span style={{fontSize:10,fontFamily:"'DM Mono',monospace",padding:'2px 6px',borderRadius:4,background:C.er+'22',color:C.er,border:`1px solid ${C.er}44`}}>ΕΚΚΡΕΜΕΙ</span>}
              {s.LogCode&&<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:C.mu}}>{s.LogCode}</span>}
            </div>
            <div style={{fontSize:13,color:C.tx,marginBottom:4}}>{s.Description}</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <Mono s c={C.mu}>{s.LoggedAt||fmtDate(s.Date)}{s.ResolvedDate?' → '+fmtDate(s.ResolvedDate):''}</Mono>
              {s.LoggedBy&&<Mono s c={C.mu}>by {s.LoggedBy}</Mono>}
              {s.eventName&&<Mono s c={C.inf} style={{cursor:'pointer'}}>@ {s.eventName}</Mono>}
              {Number(s.Cost)>0&&<Mono s c={C.ac} style={{fontWeight:700}}>{s.Cost}€</Mono>}
              {s.Notes&&<Mono s c={C.mu}>{s.Notes}</Mono>}
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}}>
            {auth.role==='pm'||auth.role==='assistant'?<XBtn onClick={()=>doDelete(s)}/>:null}
            {(!s.ResolvedDate)&&(auth.role==='pm'||auth.role==='assistant')&&<button onClick={async()=>{
              try{await call('resolveServiceLog',auth.pin,s.ServiceID,s.type);await load();}
              catch(e){show('❌ '+e.message);}
            }} style={{background:C.ok+'22',border:`1px solid ${C.ok}44`,color:C.ok,borderRadius:6,padding:'4px 8px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer',fontWeight:700}}>ΕΠΙΛΥΣΗ</button>}
          </div>
        </div>
      </div>
    ))
    }
  </div>);
}

function VehiclesTab({auth,vehicles,refresh}){
  const [adding,setAdding]=useState(false);
  const [f,setF]=useState({vehicleCode:'',name:'',plate:'',notes:''});
  const [saving,setSaving]=useState(false);
  const [vehDetail,setVehDetail]=useState(null);
  const [addService,setAddService]=useState(false);
  const [svcForm,setSvcForm]=useState({date:todayStr(),description:'',resolvedDate:'',cost:'',notes:''});
  const {msg,show}=useMsg();

  const suggestVehCode=()=>{
    const existing=vehicles.filter(v=>(v.VehicleCode||'').startsWith('VEH-'));
    if(!existing.length)return'VEH-001';
    const nums=existing.map(v=>parseInt((v.VehicleCode||'').split('-')[1]||0)).filter(n=>!isNaN(n));
    return 'VEH-'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
  };

  const doAdd=async()=>{
    if(!f.name)return;setSaving(true);
    try{await call('addVehicle',auth.pin,f);setAdding(false);setF({vehicleCode:'',name:'',plate:'',notes:''});await refresh();show('✅ Προστέθηκε');}
    catch(e){show('❌ '+e.message);}
    setSaving(false);
  };
  const doDelete=async id=>{if(!confirm('Διαγραφή οχήματος;'))return;try{await call('deleteVehicle',auth.pin,id);await refresh();setVehDetail(null);}catch(e){show('❌ '+e.message);}};

  const loadVehDetail=async(vehicleId)=>{
    try{const d=await call('getVehicleDetail',auth.pin,vehicleId);setVehDetail(d);}
    catch(e){show('❌ '+e.message);}
  };

  const doAddService=async()=>{
    if(!svcForm.description||!vehDetail)return;
    setSaving(true);
    try{
      await call('addVehicleService',auth.pin,{vehicleId:vehDetail.VehicleID,...svcForm});
      show('✅ Service καταχωρήθηκε');setAddService(false);
      setSvcForm({date:todayStr(),description:'',resolvedDate:'',cost:'',notes:''});
      const d=await call('getVehicleDetail',auth.pin,vehDetail.VehicleID);setVehDetail(d);
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  // Vehicle detail view
  if(vehDetail) return(
    <div style={{padding:24}} className="fade">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <BackBtn onClick={()=>setVehDetail(null)}/>
        <div style={{flex:1}}>
          <div style={{fontSize:20,fontWeight:800}}>{vehDetail.Name}</div>
          <div style={{display:'flex',gap:8,marginTop:2}}>
            <Mono s c={C.ac} style={{letterSpacing:2}}>{vehDetail.VehicleCode}</Mono>
            {vehDetail.Plate&&<Mono s c={C.mu}>{vehDetail.Plate}</Mono>}
          </div>
        </div>
        <XBtn onClick={()=>doDelete(vehDetail.VehicleID)}/>
      </div>
      <Toast msg={msg}/>

      <Card style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <Mono s c={C.mu} style={{letterSpacing:2}}>SERVICE / ΒΛΑΒΕΣ</Mono>
          <button onClick={()=>setAddService(a=>!a)} style={{background:C.ac+'22',border:`1px solid ${C.ac}44`,color:C.ac,borderRadius:6,padding:'4px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',fontWeight:700}}>+ ΚΑΤΑΧΩΡΗΣΗ</button>
        </div>
        {addService&&<div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14,padding:'12px',background:C.s2,borderRadius:8}}>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Mono s c={C.mu} style={{marginBottom:4}}>Ημερομηνία</Mono><input type="date" value={svcForm.date} onChange={e=>setSvcForm(f=>({...f,date:e.target.value}))} style={{width:'100%',background:C.bg,border:`1px solid ${C.br}`,borderRadius:6,padding:'8px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/></div>
            <div style={{flex:1}}><Mono s c={C.mu} style={{marginBottom:4}}>Επίλυση</Mono><input type="date" value={svcForm.resolvedDate} onChange={e=>setSvcForm(f=>({...f,resolvedDate:e.target.value}))} style={{width:'100%',background:C.bg,border:`1px solid ${C.br}`,borderRadius:6,padding:'8px',color:C.tx,fontFamily:'inherit',fontSize:13,outline:'none'}}/></div>
          </div>
          <Inp label="Περιγραφή *" value={svcForm.description} onChange={v=>setSvcForm(f=>({...f,description:v}))} placeholder="π.χ. Αλλαγή λαδιών, Βλάβη κινητήρα…"/>
          <Inp label="Κόστος (€)" value={svcForm.cost} onChange={v=>setSvcForm(f=>({...f,cost:v}))} type="number"/>
          <Inp label="Σημειώσεις" value={svcForm.notes} onChange={v=>setSvcForm(f=>({...f,notes:v}))}/>
          <Btn onClick={doAddService} disabled={saving||!svcForm.description} accent>{saving?'…':'Αποθήκευση'}</Btn>
        </div>}
        {(vehDetail.service||[]).length===0?<Mono s c={C.mu}>Δεν υπάρχουν καταχωρήσεις</Mono>:
          (vehDetail.service||[]).map(s=><div key={s.ServiceID} style={{padding:'8px 0',borderBottom:`1px solid ${C.br}`}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <div style={{fontWeight:600,fontSize:13}}>{s.Description}</div>
              {Number(s.Cost)>0&&<Mono s c={C.ac}>{s.Cost}€</Mono>}
            </div>
            <Mono s c={C.mu}>{fmtDate(s.Date)}{s.ResolvedDate?' → '+fmtDate(s.ResolvedDate):' (εκκρεμεί)'}</Mono>
            {s.Notes&&<Mono s c={C.mu}>{s.Notes}</Mono>}
          </div>)
        }
      </Card>

      <Card>
        <Mono s c={C.mu} style={{marginBottom:12,letterSpacing:2}}>ΙΣΤΟΡΙΚΟ ΧΡΗΣΗΣ</Mono>
        {(vehDetail.history||[]).length===0?<Mono s c={C.mu}>Δεν έχει χρησιμοποιηθεί ακόμα</Mono>:
          (vehDetail.history||[]).map((h,i)=><div key={i} style={{padding:'8px 0',borderBottom:`1px solid ${C.br}`}}>
            <div style={{fontWeight:600,fontSize:13}}>{h.eventName}</div>
            <Mono s c={C.mu}>{fmtDate(h.eventDate)}</Mono>
          </div>)
        }
      </Card>
    </div>
  );

  return(<div style={{padding:24}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <div style={{fontSize:28,fontWeight:800,letterSpacing:-0.5}}>Οχήματα</div>
      <button onClick={()=>{setAdding(a=>!a);if(!adding)setF(f=>({...f,vehicleCode:suggestVehCode()}));}} style={{background:C.ac,color:'#000',border:'none',borderRadius:10,padding:'10px 18px',fontFamily:'inherit',fontWeight:800,fontSize:14,cursor:'pointer'}}>{adding?'Κλείσιμο':'+ Νέο'}</button>
    </div>
    <Toast msg={msg}/>
    {adding&&<Card style={{marginBottom:20}}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:'0 0 110px'}}>
            <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>ΚΩΔΙΚΟΣ</Mono>
            <input value={f.vehicleCode} onChange={e=>setF(x=>({...x,vehicleCode:e.target.value}))} style={{width:'100%',background:C.s2,border:`1px solid ${C.ac}44`,borderRadius:8,padding:'11px 10px',color:C.ac,fontFamily:"'DM Mono',monospace",fontSize:13,outline:'none',letterSpacing:1}}/>
          </div>
          <div style={{flex:1}}><Inp label="Όνομα *" value={f.name} onChange={v=>setF(x=>({...x,name:v}))} placeholder="Sprinter, Vito…"/></div>
        </div>
        <Inp label="Πινακίδα" value={f.plate} onChange={v=>setF(x=>({...x,plate:v}))} placeholder="ΑΒΓ-1234"/>
        <Inp label="Σημειώσεις" value={f.notes} onChange={v=>setF(x=>({...x,notes:v}))}/>
        <Btn onClick={doAdd} disabled={saving||!f.name} accent>{saving?'…':'Προσθήκη'}</Btn>
      </div>
    </Card>}
    {vehicles.length===0?<Empty text="Δεν υπάρχουν οχήματα"/>:
      vehicles.map(v=><div key={v.VehicleID} onClick={()=>loadVehDetail(v.VehicleID)} style={{background:C.s1,border:`1px solid ${C.br}`,borderRadius:12,padding:'14px 16px',marginBottom:10,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontWeight:700,fontSize:15}}>{v.Name}</div>
          <div style={{display:'flex',gap:8,marginTop:2}}>
            <Mono s c={C.ac} style={{letterSpacing:1}}>{v.VehicleCode}</Mono>
            <Mono s c={C.mu}>{v.Plate}{v.Notes?' · '+v.Notes:''}</Mono>
          </div>
        </div>
        <Mono s c={C.mu}>›</Mono>
      </div>)
    }
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  const [auth,setAuth]=useState(null);
  if(!auth)return<LoginScreen onAuth={setAuth}/>;
  if(auth.role==='deleted_event') return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>🚫</div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:8,color:C.er}}>Event Ακυρωμένο</div>
      <Mono s c={C.mu} style={{marginBottom:24}}>Το event <strong style={{color:C.tx}}>{auth.eventName||auth.eventCode}</strong> έχει ακυρωθεί.</Mono>
      <button onClick={()=>setAuth(null)} style={{background:C.s2,border:`1px solid ${C.br}`,color:C.mu,borderRadius:8,padding:'10px 20px',fontFamily:'inherit',cursor:'pointer'}}>← Πίσω</button>
    </div>
  );
  if(auth.role==='tech')   return<TechView auth={auth} onLogout={()=>setAuth(null)}/>;
  if(auth.role==='collab') return<CollabView auth={auth} onLogout={()=>setAuth(null)}/>;
  return<PMView auth={auth} onLogout={()=>setAuth(null)}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
