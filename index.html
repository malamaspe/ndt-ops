<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NDT Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--s1:#111;--s2:#191919;--br:#252525;--ac:#FF6A00;--tx:#F0F0F0;--mu:#555;--er:#FF4D4D;--ok:#22C55E;--wa:#F59E0B;--inf:#60A5FA}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Bricolage Grotesque',sans-serif}

.fade{animation:up .18s ease}
select option{background:#191919;color:#F0F0F0}
@media print{.np{display:none!important}.pt{color:#000!important}body{background:#fff;color:#000}}
@media(max-width:767px){body{padding-bottom:env(safe-area-inset-bottom)}.mobile-pad{padding-bottom:calc(70px + env(safe-area-inset-bottom))!important}}
.sticky-bottom{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:14px 24px calc(28px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 70%,transparent)}
</style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;color:#C8FF00">NDT…</div></div></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────
const C={bg:'#080808',s1:'#111',s2:'#191919',br:'#252525',ac:'#FF6A00',tx:'#F0F0F0',mu:'#555',er:'#FF4D4D',ok:'#22C55E',wa:'#F59E0B',inf:'#60A5FA'};
const ROLE_FEES={'Event DJ':100,'Wedding DJ':300,'Sound Operator':100,'Lighting Operator':100,'AV Tech':80,'Installation Tech':40,'Setup Block':20,'Teardown Block':20,'Setup+Teardown':40,'Production Assistant':120,'Production Manager':200,'Other':0};
const OT_RATES={'Event DJ':10,'Wedding DJ':30,'Sound Operator':10,'Lighting Operator':10,'AV Tech':10,'Installation Tech':10,'Production Assistant':10,'Production Manager':20};
const ALL_ROLES=Object.keys(ROLE_FEES);
const TSHIRT_SIZES=['XS','S','M','L','XL','2XL','3XL','4XL'];
const EV_TYPES=['Corporate','Wedding','Live','Installation','Other'];
const INC_CATS=['Ανάρμοστη συμπεριφορά','Κακή εμφάνιση','Έλλειψη προσαρμοστικότητας','Άλλο'];
const EQ_CATS=['Booth/Control','PA','Monitor','Lights','Cabling','Stage','Stands','Effects','Other'];
const CAT_C={'Booth/Control':'#A78BFA','PA':'#60A5FA','Monitor':'#34D399','Lights':'#F59E0B','Cabling':'#6B7280','Stage':'#F87171','Stands':'#FB923C','Effects':'#EC4899','Other':'#94A3B8'};
const ST_L={planning:'Προγραμματισμός',confirmed:'Επιβεβαιωμένο',completed:'Ολοκληρώθηκε',closed:'Κλειστό',deleted:'Διαγραμμένο'};
const ST_C={planning:C.inf,confirmed:C.ok,completed:C.wa,closed:C.mu};
const ROLES_BY_TYPE={Corporate:['Event DJ','Sound Operator','Lighting Operator','AV Tech','Production Manager'],Wedding:['Wedding DJ','Sound Operator','AV Tech','Production Assistant','Production Manager'],Live:['Sound Operator','Lighting Operator','AV Tech','Production Manager'],Installation:['Installation Tech','AV Tech'],Other:ALL_ROLES};
const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('el-GR',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
const todayStr=()=>new Date().toISOString().split('T')[0];

// ─── API ──────────────────────────────────────────────────────────────────
// APPS_SCRIPT_URL is replaced at build time when deploying to GitHub Pages
// When served from Apps Script directly, google.script.run is used
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxu6oBabrOrGB6QGCoBg0hpQ8yK7aknfeuy3Li1r5F5ExgkmrCm1af4SuaIZKp6cV7x/exec';

const call = (fn, ...args) => {
  // Standalone mode (GitHub Pages): use fetch GET with URL params
  if (typeof google === 'undefined') {
    const url = APPS_SCRIPT_URL
      + '?fn=' + encodeURIComponent(fn)
      + '&args=' + encodeURIComponent(JSON.stringify(args));
    return fetch(url)
      .then(r => r.json())
      .then(r => {
        if (!r.ok) throw new Error(r.error || 'Server error');
        return r.result;
      });
  }
  // Apps Script embedded mode: use google.script.run
  return new Promise((res, rej) =>
    google.script.run.withSuccessHandler(res).withFailureHandler(e => rej(e))[fn](...args)
  );
};

// ─── SHARED UI ────────────────────────────────────────────────────────────
const Mono=({c,s,style:st,children})=><div style={{fontFamily:"'DM Mono',monospace",fontSize:s?10:13,letterSpacing:s?2:0,color:c||'inherit',...st}}>{children}</div>;
const Card=({children,style:st,onClick})=><div onClick={onClick} style={{background:C.s1,border:`1px solid ${C.br}`,borderRadius:12,padding:'14px 16px',cursor:onClick?'pointer':undefined,...st}}>{children}</div>;
const Btn=({children,onClick,disabled,accent,danger,full,style:st})=><button onClick={onClick} disabled={disabled} style={{background:accent?C.ac:danger?'transparent':C.s2,color:accent?'#000':danger?C.er:(disabled?C.mu:C.tx),border:`1px solid ${accent?C.ac:danger?C.er:C.br}`,borderRadius:10,padding:'11px 16px',fontSize:13,fontWeight:600,fontFamily:"'Bricolage Grotesque',sans-serif",cursor:disabled?'not-allowed':'pointer',width:full?'100%':undefined,...st}}>{children}</button>;
const BackBtn=({onClick})=><button onClick={onClick} style={{background:C.s2,border:`1px solid ${C.br}`,color:C.tx,borderRadius:8,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,fontSize:16}}>←</button>;
const XBtn=({onClick})=><button onClick={onClick} style={{background:'none',border:'none',color:C.er,cursor:'pointer',fontSize:20,padding:'2px 6px',lineHeight:1,flexShrink:0}}>×</button>;
const Spin=()=><div style={{display:'inline-block',width:22,height:22,border:`3px solid ${C.br}`,borderTopColor:C.ac,borderRadius:'50%',animation:'spin .7s linear infinite'}}/>;
const Empty=({text})=><div style={{textAlign:'center',color:C.mu,padding:'50px 0',fontFamily:"'DM Mono',monospace",fontSize:13}}>{text||'Κανένα αποτέλεσμα'}</div>;
const StickyBar=({children})=><div className='np sticky-bottom'>{children}</div>;
const BigBtn=({children,onClick,disabled})=><button onClick={onClick} disabled={disabled} style={{width:'100%',background:disabled?C.s2:C.ac,color:disabled?C.mu:'#000',border:'none',borderRadius:12,padding:16,fontSize:16,fontWeight:800,fontFamily:"'Bricolage Grotesque',sans-serif",cursor:disabled?'not-allowed':'pointer'}}>{children}</button>;
const SecHdr=({title,onAdd,style:st})=><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,...st}}><Mono s c={C.mu} style={{letterSpacing:2}}>{title}</Mono>{onAdd&&<button onClick={onAdd} style={{background:'none',border:`1px solid ${C.br}`,color:C.ac,borderRadius:6,padding:'4px 10px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',letterSpacing:1}}>+ ΠΡΟΣΘΗΚΗ</button>}</div>;
const ProgPill=({label,v})=>{const d=v===100;return<div style={{flex:1,background:d?C.ac:C.s2,borderRadius:6,padding:'4px 6px',textAlign:'center'}}><Mono s style={{color:d?'#000':C.mu,fontWeight:d?800:400,letterSpacing:1}}>{label} {v}%</Mono></div>;};

function Toggle({label,checked,onChange}){
  return(<div style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}} onClick={()=>onChange(!checked)}>
    <div style={{width:44,height:24,borderRadius:12,background:checked?C.ac:C.s2,border:`1px solid ${checked?C.ac:C.br}`,position:'relative',transition:'all .2s',flexShrink:0}}>
      <div style={{width:18,height:18,borderRadius:9,background:checked?'#000':C.mu,position:'absolute',top:2,left:checked?22:2,transition:'left .2s'}}/>
    </div>
    <span style={{fontSize:14,color:checked?C.tx:C.mu}}>{label}</span>
  </div>);
}

function Inp({label,value,onChange,type,placeholder,multi,options,min}){
  const s={width:'100%',background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'11px 13px',color:C.tx,fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:14,outline:'none'};
  return(<div>
    {label&&<Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>{label.toUpperCase()}</Mono>}
    {options
      ?<select value={value} onChange={e=>onChange(e.target.value)} style={s}>{options.map(o=><option key={o.value!==undefined?o.value:o} value={o.value!==undefined?o.value:o}>{o.label!==undefined?o.label:o}</option>)}</select>
      :multi
        ?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{...s,resize:'vertical',minHeight:72}}/>
        :<input type={type||'text'} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} min={min} style={s}/>
    }
  </div>);
}

function Toast({msg}){
  if(!msg)return null;
  return <div style={{background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:13,textAlign:'center'}}>{msg}</div>;
}

function useMsg(){
  const [msg,setMsg]=useState('');
  const show=(text,dur=4000)=>{setMsg(text);setTimeout(()=>setMsg(''),dur);};
  return {msg,show};
}

function StatusBadge({status}){
  const col=ST_C[status]||C.mu;
  return<span style={{background:col+'22',color:col,border:`1px solid ${col+'44'}`,borderRadius:6,padding:'3px 8px',fontSize:11,fontWeight:700}}>{ST_L[status]||status}</span>;
}

function CostGauge({cost,revenue}){
  const pct=revenue>0?Math.min(Math.round(cost/revenue*100),150):0;
  const over=revenue>0&&pct>30;
  return(<div style={{marginTop:8}}>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
      <Mono s c={C.mu}>Crew / Έσοδο</Mono>
      <Mono s c={over?C.er:revenue>0?C.ok:C.mu} style={{fontWeight:700}}>{revenue>0?pct+'%':'-'}{over?' ⚠':revenue>0?' ✓':''}</Mono>
    </div>
    {revenue>0&&<div style={{background:C.br,borderRadius:4,height:5,marginBottom:4}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:'100%',background:over?C.er:C.ok,borderRadius:4,transition:'width .3s'}}/>
    </div>}
    <div style={{display:'flex',justifyContent:'space-between'}}>
      <Mono s c={C.mu}>{cost}€ crew</Mono>
      <Mono s c={C.mu}>{revenue>0?revenue+'€ έσοδο':'Έσοδο δεν έχει οριστεί'}</Mono>
    </div>
    {over&&<Mono s c={C.er} style={{marginTop:4}}>Υπέρβαση 30% — έλεγξε crew</Mono>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════════════════
function LoginScreen({onAuth}){
  const [code,setCode]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [version,setVersion]=useState('');

  useEffect(()=>{
    // Fetch version from Settings without auth
    call('getAppVersion').then(v=>setVersion(v||'')).catch(()=>{});
  },[]);

  const tryAuth=async(val,silent=false)=>{
    setBusy(true);setErr('');
    try{
      const is4=val.length===4;
      const res=await call('authUser',is4?null:val,is4?val:null);
      if(res.role)onAuth({...res,pin:is4?null:val,eventCode:is4?val:null});
      else if(!silent){setErr('Λανθασμένος κωδικός');setCode('');}
    }catch(e){if(!silent)setErr('Σφάλμα σύνδεσης');}
    setBusy(false);
  };
  const press=d=>{
    setErr('');
    if(d==='⌫'){setCode(c=>c.slice(0,-1));return;}
    if(code.length>=6)return;
    const n=code+d;setCode(n);
    if(n.length===4)tryAuth(n,true);
    if(n.length===6)tryAuth(n,false);
  };
  const PAD=['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
  return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',padding:'48px 28px'}}>
    <div style={{marginBottom:52}}>
      <Mono s c={C.mu} style={{marginBottom:6,letterSpacing:4}}>NDT EVENT PRODUCTION</Mono>
      <div style={{fontSize:52,fontWeight:800,letterSpacing:-2,lineHeight:1}}>OPS</div>
      <div style={{width:40,height:3,background:C.ac,marginTop:14,borderRadius:2}}/>
      <Mono s c={C.ac} style={{marginTop:10,letterSpacing:3}}>EVENT · CREW · RIDER</Mono>
    </div>
    <Mono s c={C.mu} style={{marginBottom:20,textAlign:'center',letterSpacing:1}}>EVENT CODE (4ψ) ή PIN (6ψ)</Mono>
    <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:24}}>
      {[0,1,2,3,4,5].map(i=>(
        <div key={i} style={{width:i<4?44:36,height:i<4?54:44,background:C.s1,border:`2px solid ${code[i]?C.ac:C.br}`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Mono',monospace",fontSize:i<4?26:20,fontWeight:700,color:C.ac,opacity:i>=4&&code.length<4?0.2:1,transition:'all .15s'}}>
          {code[i]||''}
        </div>
      ))}
    </div>
    {err&&<Mono s c={C.er} style={{textAlign:'center',marginBottom:12,letterSpacing:1}}>{err}</Mono>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,maxWidth:280,margin:'0 auto',width:'100%'}}>
      {PAD.map((d,i)=>(
        <button key={i} onClick={()=>press(d)} disabled={busy} style={{height:58,border:`1px solid ${C.br}`,borderRadius:10,background:d==='✓'&&code.length>=4?C.ac:C.s1,color:d==='✓'&&code.length>=4?'#000':(busy?C.mu:C.tx),fontFamily:"'DM Mono',monospace",fontSize:d.length>1?18:22,fontWeight:700,cursor:busy?'wait':'pointer'}}>
          {busy&&d==='✓'?'…':d}
        </button>
      ))}
    </div>
    <Mono s c={C.mu} style={{marginTop:'auto',paddingTop:40,textAlign:'center',letterSpacing:1}}>NDT · {version||'…'}</Mono>
  </div>);
}

// ─── QR HELPERS ──────────────────────────────────────────────────────────
const qrUrl=code=>`https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(code)}`;
function QRModal({code,name,onClose}){
  return(<div style={{position:'fixed',inset:0,background:'#000c',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={onClose}>
    <div style={{background:C.s1,borderRadius:16,padding:24,maxWidth:300,width:'100%',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{name}</div>
      <Mono s c={C.ac} style={{marginBottom:16,letterSpacing:2}}>{code}</Mono>
      <img src={qrUrl(code)} alt="QR" style={{width:180,height:180,borderRadius:8,background:'#fff',padding:8}}/>
      <div style={{marginTop:16,display:'flex',gap:8}}>
        <button onClick={()=>window.open(qrUrl(code))} style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,color:C.mu,borderRadius:8,padding:10,fontFamily:'inherit',fontSize:12,cursor:'pointer'}}>Αποθήκευση</button>
        <button onClick={onClose} style={{flex:1,background:C.ac,border:'none',color:'#000',borderRadius:8,padding:10,fontFamily:'inherit',fontWeight:700,fontSize:12,cursor:'pointer'}}>Κλείσιμο</button>
      </div>
    </div>
  </div>);
}

// ─── SERVICE REPORT MODAL (reusable) ─────────────────────────────────────
function ServiceReportModal({allUnits,form,setForm,onClose,onSubmit}){
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const cats=[...new Set((allUnits||[]).map(u=>u.category||'Other'))];
  return(<div style={{position:'fixed',inset:0,background:'#000a',zIndex:100,display:'flex',alignItems:'flex-end'}}>
    <div style={{background:C.s1,borderRadius:'16px 16px 0 0',padding:20,width:'100%',maxHeight:'88vh',overflow:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
        <Mono s c={C.ac}>Αναφορά Βλάβης</Mono>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.mu,cursor:'pointer',fontSize:20}}>×</button>
      </div>
      {/* Step 1: Category */}
      {!form.selCat&&<div>
        <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>ΚΑΤΗΓΟΡΙΑ</Mono>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {cats.map(cat=><button key={cat} onClick={()=>sf('selCat',cat)} style={{background:C.s2,border:`1px solid ${C.br}`,color:C.tx,borderRadius:8,padding:'8px 14px',fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer'}}>{cat}</button>)}
          <button onClick={()=>sf('isVehicle',true)} style={{background:C.s2,border:`1px solid ${C.inf}44`,color:C.inf,borderRadius:8,padding:'8px 14px',fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer'}}>Όχημα</button>
        </div>
      </div>}
      {/* Step 2: Type */}
      {form.selCat&&!form.selType&&!form.isVehicle&&<div>
        <button onClick={()=>sf('selCat','')} style={{background:'none',border:'none',color:C.mu,cursor:'pointer',fontSize:12,marginBottom:8,padding:0}}>← {form.selCat}</button>
        <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>ΤΥΠΟΣ</Mono>
        {[...new Map((allUnits||[]).filter(u=>(u.category||'Other')===form.selCat).map(u=>[u.typeCode,u])).values()].map(u=>(
          <div key={u.typeCode} onClick={()=>sf('selType',u.typeCode)} style={{padding:'10px 12px',borderRadius:8,border:`1px solid ${C.br}`,background:C.s2,marginBottom:6,cursor:'pointer'}}>
            <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
            <Mono s c={C.mu}>{u.typeCode}</Mono>
          </div>
        ))}
      </div>}
      {/* Step 2b: Vehicle */}
      {form.isVehicle&&!form.selCat&&<div>
        <button onClick={()=>sf('isVehicle',false)} style={{background:'none',border:'none',color:C.mu,cursor:'pointer',fontSize:12,marginBottom:8,padding:0}}>← Κατηγορία</button>
        <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>ΟΧΗΜΑ</Mono>
        <Inp label="" value={form.vehicleId} onChange={v=>sf('vehicleId',v)} options={[{value:'',label:'Επίλεξε όχημα…'}]}/>
      </div>}
      {/* Step 3: Unit */}
      {form.selType&&!form.selectedUnitId&&<div>
        <button onClick={()=>sf('selType','')} style={{background:'none',border:'none',color:C.mu,cursor:'pointer',fontSize:12,marginBottom:8,padding:0}}>← Τύπος</button>
        <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>ΤΕΜΑΧΙΟ</Mono>
        {(allUnits||[]).filter(u=>u.typeCode===form.selType).map(u=>(
          <div key={u.itemId} onClick={()=>{sf('selectedUnitId',u.itemId);sf('selUnit',u.unitCode);}} style={{padding:'10px 12px',borderRadius:8,border:`1px solid ${C.br}`,background:C.s2,marginBottom:6,cursor:'pointer'}}>
            <Mono s style={{letterSpacing:2}}>{u.unitCode}</Mono>
            {u.notes&&<Mono s c={C.mu}>{u.notes}</Mono>}
          </div>
        ))}
      </div>}
      {/* Selected indicator */}
      {(form.selectedUnitId||form.vehicleId)&&<div style={{padding:'8px 12px',background:C.ok+'18',border:`1px solid ${C.ok}44`,borderRadius:8,marginBottom:10,display:'flex',justifyContent:'space-between'}}>
        <Mono s c={C.ok}>{form.selUnit||'Όχημα επιλεγμένο'}</Mono>
        <button onClick={()=>setForm(f=>({...f,selectedUnitId:'',selUnit:'',selType:'',selCat:'',vehicleId:'',isVehicle:false}))} style={{background:'none',border:'none',color:C.mu,cursor:'pointer',fontSize:16}}>×</button>
      </div>}
      {/* Description + submit */}
      {(form.selectedUnitId||form.vehicleId)&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Inp label="Περιγραφή *" value={form.description} onChange={v=>sf('description',v)} placeholder="π.χ. Σπασμένη γκρίλια…"/>
        <Inp label="Σημειώσεις" value={form.notes} onChange={v=>sf('notes',v)}/>
        <button onClick={onSubmit} disabled={!form.description} style={{width:'100%',background:C.er,color:'#fff',border:'none',borderRadius:10,padding:13,fontFamily:'inherit',fontWeight:800,fontSize:14,cursor:'pointer',opacity:form.description?1:0.4}}>Καταχώρηση Βλάβης</button>
      </div>}
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// TECH VIEW
// ═══════════════════════════════════════════════════════════════════════════
function TechView({auth,onLogout,readOnly}){
  const [event,setEvent]=useState(null);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');
  const [unitPicker,setUnitPicker]=useState(null); // {rowId, typeCode, qty, currentUnits}
  const [availUnits,setAvailUnits]=useState([]);
  const [selectedUnits,setSelectedUnits]=useState([]);
  const [serviceModal,setServiceModal]=useState(null); // {type:'equipment'|'vehicle', itemId, unitCode}
  const [svcForm,setSvcForm]=useState({description:'',notes:'',vehicleId:'',selectedUnitId:'',selCat:'',selType:'',selUnit:'',isVehicle:false});
  const [eventVehicles,setEventVehicles]=useState([]);
  const [scanProgress,setScanProgress]=useState({});
  const [nfcOpen,setNfcOpen]=useState(false);
  const [nfcMsg,setNfcMsg]=useState('');
  const [nfcError,setNfcError]=useState('');
  const [manualCode,setManualCode]=useState('');
  const scannedForPrepRef=useRef({});
  const nfcAbortRef=useRef(null);
  const hasNFC=typeof window!=='undefined'&&'NDEFReader' in window;

  const handleScan=useCallback((code)=>{
    const clean=(code||'').trim();
    if(!clean)return;
    setEvent(ev=>{
      if(!ev)return ev;
      const matchedItem=ev.equipment.find(item=>item.TypeCode&&clean.startsWith(item.TypeCode));
      if(!matchedItem){
        setNfcError('Δεν βρέθηκε στον rider: '+clean);
        setTimeout(()=>setNfcError(''),2500);
        return ev;
      }
      const tc=matchedItem.TypeCode;
      const qty=Number(matchedItem.Qty)||1;
      if(!scannedForPrepRef.current[tc]) scannedForPrepRef.current[tc]=new Set();
      if(scannedForPrepRef.current[tc].has(clean)){
        setNfcMsg('Ήδη: '+clean);
        setTimeout(()=>setNfcMsg(''),1500);
        return ev;
      }
      scannedForPrepRef.current[tc].add(clean);
      const scannedCount=scannedForPrepRef.current[tc].size;
      setScanProgress(prev=>({...prev,[tc]:{count:scannedCount,qty,name:matchedItem.name}}));
      if(scannedCount>=qty&&!matchedItem.prep){
        call('updateTick',auth.eventCode||auth.pin,matchedItem.RowID,'prep',true).catch(()=>{});
        setNfcMsg('✓ PREP: '+matchedItem.name);
        setTimeout(()=>setNfcMsg(''),2000);
        return {...ev,equipment:ev.equipment.map(i=>i.RowID===matchedItem.RowID?{...i,prep:true}:i)};
      }
      setNfcMsg(matchedItem.name+' · '+scannedCount+'/'+qty);
      setTimeout(()=>setNfcMsg(''),1500);
      return ev;
    });
  },[auth.eventCode,auth.pin]);

  const stopNFC=useCallback(()=>{
    if(nfcAbortRef.current){nfcAbortRef.current.abort();nfcAbortRef.current=null;}
    setNfcOpen(false);setNfcMsg('');setNfcError('');
  },[]);

  const startNFC=useCallback(async()=>{
    if(!hasNFC)return;
    setNfcOpen(true);setNfcMsg('Πλησίασε tag...');setNfcError('');
    try{
      const ac=new AbortController();
      nfcAbortRef.current=ac;
      const reader=new window.NDEFReader();
      await reader.scan({signal:ac.signal});
      reader.onreading=({message})=>{
        for(const record of message.records){
          if(record.recordType==='text'){
            handleScan(new TextDecoder(record.encoding||'utf-8').decode(record.data));
            return;
          }
          if(record.recordType==='url'){
            const url=new TextDecoder().decode(record.data);
            const m=url.match(/[?&]scan=([^&]+)/)||url.match(/\/([^/]+)$/);
            if(m)handleScan(decodeURIComponent(m[1]));
            return;
          }
        }
      };
      reader.onreadingerror=()=>{setNfcError('Σφάλμα tag');setTimeout(()=>setNfcError(''),2000);};
    }catch(e){
      if(e.name!=='AbortError'){setNfcOpen(false);alert('NFC: '+e.message);}
    }
  },[hasNFC,handleScan]);

  const doReportService=async()=>{
    if(!svcForm.description||!serviceModal)return;
    const key=auth.eventCode||auth.pin;
    const resetForm={description:'',notes:'',vehicleId:'',selectedUnitId:'',selCat:'',selType:'',selUnit:'',isVehicle:false};
    try{
      if(svcForm.isVehicle||svcForm.vehicleId){
        if(!svcForm.vehicleId){alert('Επίλεξε όχημα');return;}
        await call('addVehicleServiceFromTech',key,{vehicleId:svcForm.vehicleId,description:svcForm.description,notes:svcForm.notes,eventId:event?.EventID||''});
      } else {
        if(!svcForm.selectedUnitId){alert('Επίλεξε τεμάχιο');return;}
        await call('addEquipmentService',key,{itemId:svcForm.selectedUnitId,description:svcForm.description,notes:svcForm.notes,eventId:event?.EventID||''});
      }
      setSvcForm(resetForm);setServiceModal(null);
    }catch(e){alert('Σφάλμα: '+e.message);}
  };

  const openServiceReport=async()=>{
    const key=auth.eventCode||auth.pin;
    try{
      // Load ALL warehouse units for the category picker
      const allUnits=await call('getWarehouse',key);
      const flat=[];
      (allUnits||[]).forEach(g=>g.units.forEach(u=>flat.push({itemId:u.itemId,unitCode:u.unitCode,typeCode:g.typeCode,name:g.name,category:g.category,notes:u.notes||''})));
      setServiceModal({type:'general',allUnits:flat});
      setSvcForm({description:'',notes:'',vehicleId:'',selectedUnitId:'',selCat:'',selType:'',selUnit:'',isVehicle:false});
    }catch(e){
      setServiceModal({type:'general',allUnits:[]});
    }
  };

  useEffect(()=>{
    const collabKey=auth.eventCode||auth.pin; // collab PINs are 4-digit in eventCode slot
    const fn=readOnly
      ?()=>call('getEventForCollab',collabKey,auth.viewEventId)
      :()=>call('getEventByCode',auth.eventCode);
    fn().then(ev=>setEvent(ev)).catch(e=>setErr(e.message||'Σφάλμα')).finally(()=>setLoading(false));
  },[]);

  const doTick=async(rowId,stage,cur)=>{
    if(readOnly)return;
    const nv=!cur;
    setEvent(ev=>({...ev,equipment:ev.equipment.map(i=>{
      if(i.RowID!==rowId)return i;
      const n={...i};
      if(stage==='prep'){n.prep=nv;if(!nv){n.load=false;n.loadout=false;}}
      else if(stage==='load'){if(!i.prep)return i;n.load=nv;if(!nv)n.loadout=false;}
      else if(stage==='loadout'){if(!i.load)return i;n.loadout=nv;}
      return n;
    })}));
    try{await call('updateTick',auth.eventCode||auth.pin,rowId,stage,nv);}catch(e){}
  };

  const openUnitPicker=async(item)=>{
    try{
      const units=await call('getAvailableUnits',auth.eventCode,event.EventID,item.TypeCode);
      const current=(item.loadedUnits||'').split(',').filter(Boolean);
      setAvailUnits(units);
      setSelectedUnits([...current]);
      setUnitPicker({rowId:item.RowID,typeCode:item.TypeCode,qty:Number(item.Qty),name:item.name});
    }catch(e){}
  };

  const saveUnits=async()=>{
    try{
      await call('updateLoadedUnits',auth.eventCode,unitPicker.rowId,selectedUnits);
      setEvent(ev=>({...ev,equipment:ev.equipment.map(i=>i.RowID===unitPicker.rowId?{...i,loadedUnits:selectedUnits.join(',')}:i)}));
      setUnitPicker(null);
    }catch(e){}
  };

  if(loading)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><Spin/></div>;
  if(!event)return<div style={{padding:40,textAlign:'center',color:C.er}}>{err||'Event not found'}</div>;
  const eq=event.equipment||[];
  const grouped=eq.reduce((a,i)=>{(a[i.category]=a[i.category]||[]).push(i);return a;},{});
  const pct=k=>eq.length>0?Math.round(eq.filter(i=>i[k]).length/eq.length*100):0;
  const STGS=[{key:'prep',label:'P',color:C.wa,full:'Prep'},{key:'load',label:'L',color:C.ok,full:'Load'},{key:'loadout',label:'O',color:C.inf,full:'Out'}];
  const canTick=(item,stg)=>stg==='prep'?true:stg==='load'?item.prep:item.load;

  return(<div style={{minHeight:'100vh',paddingBottom:60}}>
    {serviceModal&&<ServiceReportModal
      allUnits={serviceModal.allUnits||[]}
      form={svcForm} setForm={setSvcForm}
      onClose={()=>{setServiceModal(null);setSvcForm({description:'',notes:'',vehicleId:'',selectedUnitId:'',selCat:'',selType:'',selUnit:'',isVehicle:false});}}
      onSubmit={doReportService}
    />}

    <div style={{position:'sticky',top:0,zIndex:20,background:C.bg,borderBottom:`1px solid ${C.br}`,padding:'12px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
        <button onClick={onLogout} style={{background:'none',border:'none',color:C.mu,cursor:'pointer',fontFamily:'inherit',fontSize:12}} className="np">← Έξοδος</button>
        <button onClick={()=>window.print()} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:10,padding:'4px 10px',borderRadius:6}} className="np">PRINT</button>
        {!readOnly&&<div style={{display:'flex',gap:6,alignItems:'center'}}>
        {hasNFC&&<button onClick={startNFC} style={{background:C.ac,border:'none',color:'#000',cursor:'pointer',fontFamily:"'DM Mono',monospace",fontSize:10,padding:'5px 12px',borderRadius:6,fontWeight:700,flexShrink:0}}>NFC</button>}
        <button onClick={openServiceReport} style={{background:C.er+'22',border:`1px solid ${C.er}44`,color:C.er,borderRadius:6,padding:'5px 12px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',fontWeight:700,flexShrink:0}}>ΒΛΑΒΗ</button>
        <input value={manualCode} onChange={e=>setManualCode(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&manualCode.trim()){handleScan(manualCode.trim());setManualCode('');}}} placeholder="unit code + Enter" style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:6,padding:'5px 8px',color:C.tx,fontFamily:"'DM Mono',monospace",fontSize:10,outline:'none'}}/>
      </div>}
      </div>
      {!readOnly&&<div>
        {/* NFC scan modal — centered overlay, stays open for continuous scanning */}
        {nfcOpen&&<div style={{position:'fixed',inset:0,background:'#000a',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:C.s1,borderRadius:20,padding:24,width:'100%',maxWidth:360,maxHeight:'80vh',overflow:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div>
                <div style={{fontWeight:800,fontSize:17}}>NFC Scan</div>
                <Mono s c={C.mu}>Πλησίασε το tag στο κινητό</Mono>
              </div>
              <button onClick={stopNFC} style={{background:C.er+'22',border:`1px solid ${C.er}44`,color:C.er,borderRadius:8,padding:'6px 12px',fontFamily:"'DM Mono',monospace",fontSize:11,cursor:'pointer',fontWeight:700}}>ΤΕΛΟΣ</button>
            </div>

            {/* Animated NFC indicator */}
            <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
              <div style={{width:80,height:80,borderRadius:40,border:`3px solid ${C.ac}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,animation:'pulse 1.5s ease-in-out infinite'}}>📶</div>
            </div>

            {/* Status message */}
            {nfcMsg&&<div style={{padding:'8px 14px',background:C.ok+'22',border:`1px solid ${C.ok}44`,borderRadius:8,marginBottom:10,textAlign:'center'}}>
              <Mono s c={C.ok} style={{fontWeight:700}}>{nfcMsg}</Mono>
            </div>}
            {nfcError&&<div style={{padding:'8px 14px',background:C.er+'22',border:`1px solid ${C.er}44`,borderRadius:8,marginBottom:10,textAlign:'center'}}>
              <Mono s c={C.er}>{nfcError}</Mono>
            </div>}

            {/* Scan progress per type */}
            {Object.keys(scanProgress).length>0&&<div style={{borderTop:`1px solid ${C.br}`,paddingTop:12,marginTop:4}}>
              <Mono s c={C.mu} style={{letterSpacing:2,marginBottom:8}}>ΠΡΟΟΔΟΣ</Mono>
              {Object.entries(scanProgress).map(([tc,{count,qty,name}])=>{
                const done=count>=qty;
                return(<div key={tc} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',borderRadius:8,background:done?C.ok+'18':C.s2,marginBottom:6,border:`1px solid ${done?C.ok:C.br}44`}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{name}</div>
                    <Mono s c={C.mu} style={{fontSize:9}}>{tc}</Mono>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <Mono s c={done?C.ok:C.wa} style={{fontWeight:700,fontSize:15}}>{count}/{qty}</Mono>
                    {done&&<div style={{fontSize:10,color:C.ok}}>✓ PREP</div>}
                  </div>
                </div>);
              })}
            </div>}
          </div>
        </div>}

        {/* Scan progress outside modal (after NFC closed) */}
        {!nfcOpen&&Object.entries(scanProgress).map(([tc,{count,qty,name}])=>{
          const done=count>=qty;
          return(<div key={tc} style={{padding:'5px 10px',background:done?C.ok+'22':C.wa+'22',border:`1px solid ${done?C.ok:C.wa}44`,borderRadius:7,marginBottom:5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <Mono s c={done?C.ok:C.wa}>{done?'✓ PREP: ':''}{name}</Mono>
            <Mono s c={done?C.ok:C.wa} style={{fontWeight:700}}>{count}/{qty}</Mono>
          </div>);
        })}
      </div>}
      <div style={{fontWeight:700,fontSize:18}}>{event.Name}</div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
        <Mono s c={C.mu}>{fmtDate(event.Date)}{event.Venue?' · '+event.Venue:''}</Mono>
        <Mono s c={C.ac} style={{letterSpacing:2}}>{event.EventCode}</Mono>
        {event.StartTime&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:11,padding:'2px 8px',borderRadius:5,background:C.er+'22',color:C.er,border:`1px solid ${C.er}44`,fontWeight:700}}>DEADLINE {event.StartTime}</span>}
      </div>
      {readOnly&&<div style={{padding:'3px 10px',background:'#F59E0B22',border:'1px solid #F59E0B44',borderRadius:6,marginBottom:6}}><Mono s c={C.wa}>👁 Προβολή μόνο — τα ticks ενεργά μόνο με event code</Mono></div>}
      <div style={{display:'flex',gap:6}}><ProgPill label="PREP" v={pct('prep')}/><ProgPill label="LOAD" v={pct('load')}/><ProgPill label="OUT" v={pct('loadout')}/></div>
    </div>

    {/* Unit picker modal */}
    {unitPicker&&<div style={{position:'fixed',inset:0,background:'#000a',zIndex:100,display:'flex',alignItems:'flex-end'}}>
      <div style={{background:C.s1,borderRadius:'16px 16px 0 0',padding:20,width:'100%',maxHeight:'70vh',overflow:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontWeight:700,fontSize:16}}>{unitPicker.name}</div>
            <Mono s c={C.mu}>Επίλεξε {unitPicker.qty} τεμάχια · {selectedUnits.length}/{unitPicker.qty}</Mono>
          </div>
          <button onClick={()=>setUnitPicker(null)} style={{background:'none',border:'none',color:C.mu,fontSize:24,cursor:'pointer'}}>×</button>
        </div>
        {availUnits.map(u=>{
          const isSel=selectedUnits.includes(u.unitCode);
          const canSel=isSel||selectedUnits.length<unitPicker.qty;
          return(<div key={u.itemId} onClick={()=>{
            if(!u.available&&!isSel)return;
            if(!canSel&&!isSel)return;
            setSelectedUnits(s=>isSel?s.filter(x=>x!==u.unitCode):[...s,u.unitCode]);
          }} style={{display:'flex',alignItems:'center',padding:'12px',marginBottom:6,borderRadius:10,border:`1px solid ${isSel?C.ac:C.br}`,background:isSel?C.ac+'22':C.s2,cursor:(u.available||isSel)?'pointer':'not-allowed',opacity:(!u.available&&!isSel)?0.4:1}}>
            <div style={{flex:1}}>
              <Mono s c={isSel?C.ac:C.tx} style={{letterSpacing:2,fontWeight:isSel?700:400}}>{u.unitCode}</Mono>
              {!u.available&&!isSel&&<Mono s c={C.er}>Σε χρήση</Mono>}
            </div>
            {isSel&&<div style={{width:20,height:20,borderRadius:10,background:C.ac,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#000',fontWeight:700}}>✓</div>}
          </div>);
        })}
        <button onClick={saveUnits} disabled={selectedUnits.length!==unitPicker.qty} style={{width:'100%',marginTop:12,background:C.ac,color:'#000',border:'none',borderRadius:10,padding:14,fontFamily:'inherit',fontWeight:800,fontSize:14,cursor:'pointer',opacity:selectedUnits.length!==unitPicker.qty?0.4:1}}>
          Αποθήκευση ({selectedUnits.length}/{unitPicker.qty})
        </button>
      </div>
    </div>}

    <div style={{padding:'16px 20px'}}>
      {(event.ContactName||event.ContactPhone)&&<Card style={{marginBottom:10}}>
        <Mono s c={C.mu} style={{marginBottom:4,letterSpacing:2}}>ΠΕΛΑΤΗΣ</Mono>
        {event.ContactName&&<div style={{fontWeight:600,fontSize:13}}>{event.ContactName}</div>}
        {event.ContactPhone&&<a href={`tel:${event.ContactPhone}`} style={{color:C.ac,fontFamily:"'DM Mono',monospace",fontSize:13,textDecoration:'none'}}>{event.ContactPhone}</a>}
      </Card>}
      {event.MapsLink&&<a href={event.MapsLink} target="_blank" style={{display:'flex',alignItems:'center',gap:8,background:C.s1,border:`1px solid ${C.br}`,borderRadius:10,padding:'11px 14px',marginBottom:10,color:C.tx,textDecoration:'none'}}><span>📍</span><Mono s>Google Maps</Mono></a>}
      {(event.assignments||[]).length>0&&<Card style={{marginBottom:12}}>
        {event.assignments.map((m,i)=><div key={m.RowID||i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:i?8:0,marginTop:i?8:0,borderTop:i?`1px solid ${C.br}`:''}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{m.collabName}</div>
            <Mono s c={C.mu}>{m.AssignedRole}{Number(m.DriverFee)>0?' · 🚐':''}{m.SetupDate&&m.SetupDate!==event.Date?' · setup '+fmtDate(m.SetupDate):''}{m.TeardownDate&&m.TeardownDate!==event.Date?' · teardown '+fmtDate(m.TeardownDate):''}</Mono>
          </div>
          {m.collabPhone&&<a href={`tel:${m.collabPhone}`} style={{color:C.ac,fontFamily:"'DM Mono',monospace",fontSize:12,textDecoration:'none'}}>{m.collabPhone}</a>}
        </div>)}
      </Card>}
      {(event.vehicles||[]).length>0&&<Card style={{marginBottom:12}}>
        {event.vehicles.map((v,i)=><div key={v.RowID||i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:i?8:0,marginTop:i?8:0,borderTop:i?`1px solid ${C.br}`:''}}>
          <div><div style={{fontWeight:600,fontSize:13}}>{v.vehicleName}</div><Mono s c={C.mu}>{v.vehiclePlate}{v.driverName?' · '+v.driverName:''}</Mono></div>
          {!readOnly&&<button onClick={()=>setServiceModal({type:'vehicle',unitCode:v.vehicleName,itemId:null})} style={{background:C.er+'22',border:`1px solid ${C.er}44`,color:C.er,borderRadius:6,padding:'4px 7px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer'}}>⚠ Βλάβη</button>}
        </div>)}
      </Card>}
      <div style={{display:'flex',gap:12,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
        <Mono s c={C.mu}>LEGEND</Mono>
        {STGS.map(s=><div key={s.key} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:20,height:20,borderRadius:4,background:s.color,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:'#000'}}>{s.label}</div><Mono s c={C.mu}>{s.full}</Mono></div>)}
      </div>
      {eq.length===0&&<Empty text="Δεν έχει οριστεί εξοπλισμός"/>}
      {Object.entries(grouped).map(([cat,items])=>(
        <div key={cat} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <div style={{width:24,height:1,background:CAT_C[cat]||C.mu}}/>
            <Mono s style={{color:CAT_C[cat]||C.mu,letterSpacing:2}}>{cat.toUpperCase()}</Mono>
          </div>
          {items.map(item=>{
            const loadedArr=(item.loadedUnits||'').split(',').filter(Boolean);
            return(
            <div key={item.RowID} style={{padding:'12px 0',borderBottom:`1px solid ${C.br}`}}>
              <div style={{display:'flex',alignItems:'center'}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{item.name} <span style={{fontFamily:"'DM Mono',monospace",color:C.ac,fontSize:11}}>×{item.Qty}</span></div>
                  <Mono s c={C.mu}>{item.TypeCode}</Mono>
                  {loadedArr.length>0&&<div style={{marginTop:4,display:'flex',gap:4,flexWrap:'wrap'}}>
                    {loadedArr.map(u=><span key={u} style={{fontFamily:"'DM Mono',monospace",fontSize:9,padding:'2px 6px',borderRadius:4,background:C.ac+'22',color:C.ac,border:`1px solid ${C.ac}44`}}>{u}</span>)}
                  </div>}
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  {item.prep&&!readOnly&&<button onClick={()=>!item.load&&openUnitPicker(item)} style={{background:'none',border:`1px solid ${item.load?'#333':C.br}`,color:item.load?'#333':C.mu,borderRadius:6,padding:'4px 8px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:item.load?'not-allowed':'pointer',opacity:item.load?0.3:1}}>UNITS</button>}
                <button onClick={openServiceReport} style={{background:'#FF4D4D22',border:'1px solid #FF4D4D44',color:'#FF4D4D',borderRadius:6,padding:'4px 7px',fontFamily:"'DM Mono',monospace",fontSize:9,cursor:'pointer'}}>⚠</button>
                  {STGS.map(({key,label,color})=>(
                    <button key={key} onClick={()=>canTick(item,key)&&doTick(item.RowID,key,item[key])} style={{width:42,height:42,borderRadius:10,border:`2px solid ${item[key]?color:C.br}`,background:item[key]?color:'transparent',color:item[key]?'#000':canTick(item,key)?C.mu:C.br,fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,cursor:canTick(item,key)?'pointer':'not-allowed',transition:'all .1s'}}>
                      {item[key]?'✓':label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          );})}
        </div>
      ))}
      {event.Notes&&<Card style={{marginTop:12}}><Mono s c={C.mu} style={{marginBottom:6,letterSpacing:2}}>ΣΗΜΕΙΩΣΕΙΣ</Mono><p style={{fontSize:13,color:C.mu,lineHeight:1.6}}>{event.Notes}</p></Card>}
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// PM VIEW ROOT
// ═══════════════════════════════════════════════════════════════════════════
function PMView({auth,onLogout}){
  const isPM = auth.role==='pm';
  const [tab,setTab]=useState('events');
  const [events,setEvents]=useState([]);
  const [deletedEvents,setDeletedEvents]=useState([]);
  const [collabs,setCollabs]=useState([]);
  const [vehicles,setVehicles]=useState([]);
  const [warehouse,setWarehouse]=useState([]);
  const [busyMap,setBusyMap]=useState({}); // collabId → [dates]
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [screen,setScreen]=useState({type:'list'});

  // Single call startup
  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{
      const d=await call('getInitialAppData',auth.pin);
      setEvents(d.events||[]);
      setDeletedEvents(d.deletedEvents||[]);
      setCollabs(d.collabs||[]);
      setVehicles(d.vehicles||[]);
      setWarehouse(d.warehouse||[]);
      setBusyMap(d.busyMap||{});
      setClients(d.clients||[]);
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  },[auth.pin]);

  const refreshEvents =useCallback(async()=>{try{const d=await call('getInitialAppData',auth.pin);setEvents(d.events||[]);setDeletedEvents(d.deletedEvents||[]);setBusyMap(d.busyMap||{});}catch(e){}},[auth.pin]);
  const refreshCollabs=useCallback(async()=>{try{setCollabs(await call('getCollaborators',auth.pin));}catch(e){}},[auth.pin]);
  const refreshVeh    =useCallback(async()=>{try{setVehicles(await call('getVehicles',auth.pin));}catch(e){}},[auth.pin]);
  const refreshWH     =useCallback(async()=>{try{setWarehouse(await call('getWarehouse',auth.pin));}catch(e){}},[auth.pin]);

  useEffect(()=>{loadAll();},[]);

  const go=(s)=>{setScreen(s);};
  const backList=()=>setScreen({type:'list'});

  const NAV=[
    {key:'events', icon:'📋',label:'Events'},
    {key:'crew',   icon:'👥',label:'Crew'},
    {key:'clients',icon:'🏢',label:'Πελάτες'},
    {key:'wh',     icon:'📦',label:'Αποθήκη'},
    {key:'veh',    icon:'🚐',label:'Οχήματα'},
    {key:'service',icon:'🔧',label:'Βλάβες'},
  ];

  const renderContent=()=>{
    if(tab==='crew')     return <CollabsTab auth={auth} collabs={collabs} refresh={refreshCollabs} isPM={isPM}/>;
    if(tab==='clients')  return <ClientsTab auth={auth} clients={clients} refresh={async()=>{const d=await call('getInitialAppData',auth.pin);setClients(d.clients||[]);}} isPM={isPM}/>;
    if(tab==='service')  return <ServiceLogTab auth={auth}/>;
    if(tab==='wh')      return <div><WarehouseTab auth={auth} warehouse={warehouse} refresh={refreshWH}/><div style={{padding:'0 24px 40px'}}><PackagesSection auth={auth} warehouse={warehouse}/></div></div>;
    if(tab==='veh')     return <VehiclesTab auth={auth} vehicles={vehicles} refresh={refreshVeh}/>;
    // events tab
    if(screen.type==='create') return <EventForm auth={auth} clients={clients} onSave={async d=>{await call('createEvent',auth.pin,d);await refreshEvents();backList();}} onBack={backList}/>;
    if(screen.type==='edit')   return <EventForm auth={auth} clients={clients} event={screen.event} onSave={async d=>{await call('updateEvent',auth.pin,d);await refreshEvents();backList();}} onBack={backList}/>;
    if(screen.type==='detail') return (
      <EventDetail
        auth={auth} eventId={screen.eventId}
        collabs={collabs} vehicles={vehicles} warehouse={warehouse}
        busyMap={busyMap} clients={clients}
        isPM={isPM}
        onEdit={ev=>go({type:'edit',event:ev})}
        onDelete={isPM?async()=>{await call('deleteEvent',auth.pin,screen.eventId);await refreshEvents();backList();}:null}
        onBack={backList}
        onRefresh={refreshEvents}
      />
    );
    if(screen.type==='collab') return <CollabDetail auth={auth} collabId={screen.collabId} onBack={backList}/>;
    if(screen.type==='archive') return <DeletedEventsArchive auth={auth} events={deletedEvents} onRestore={async id=>{await call('restoreEvent',auth.pin,id);await refreshEvents();}} onBack={backList}/>;
    return <EventsList events={events} loading={loading} isPM={isPM} onCreate={()=>go({type:'create'})} onOpen={id=>go({type:'detail',eventId:id})} onArchive={isPM?()=>go({type:'archive'}):null}/>;
  };

  // Responsive: sidebar on desktop (≥768px), bottom nav on mobile
  const [isDesktop,setIsDesktop]=useState(window.innerWidth>=768);
  useEffect(()=>{
    const h=()=>setIsDesktop(window.innerWidth>=768);
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);

  if(isDesktop) return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Sidebar */}
      <div style={{width:200,flexShrink:0,background:C.s1,borderRight:`1px solid ${C.br}`,display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',overflow:'hidden'}}>
        <div style={{padding:'20px 16px 12px'}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:4,color:C.ac,marginBottom:4}}>NDT OPS</div>
          <div style={{fontSize:12,color:C.mu,fontFamily:"'DM Mono',monospace"}}>{auth.role==='pm'?'Production Manager':'Assistant'}</div>
        </div>
        <div style={{flex:1,padding:'0 8px'}}>
          {NAV.map(t=>(
            <button key={t.key} onClick={()=>{setTab(t.key);backList();}} style={{display:'flex',alignItems:'center',gap:10,width:'100%',background:tab===t.key?C.ac+'18':'none',border:'none',borderRadius:8,padding:'10px 10px',color:tab===t.key?C.ac:C.mu,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:tab===t.key?700:400,marginBottom:2,textAlign:'left'}}>
              <span style={{fontSize:16}}>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>
        <div style={{padding:'10px 8px'}}>
          <button onClick={onLogout} style={{display:'flex',alignItems:'center',gap:8,width:'100%',background:'none',border:`1px solid ${C.br}`,borderRadius:8,padding:'9px 10px',color:C.mu,cursor:'pointer',fontFamily:'inherit',fontSize:12}}>
            <span>🔐</span>Έξοδος
          </button>
        </div>
      </div>
      {/* Main content — full remaining width */}
      <div style={{flex:1,overflow:'auto',minWidth:0}}>
        {renderContent()}
      </div>
    </div>
  );

  // Mobile layout
  return(<div style={{minHeight:'100vh',background:C.bg}}>
    <div className='mobile-pad'>{renderContent()}</div>
    <div className="np" style={{position:'fixed',bottom:0,left:0,right:0,background:C.s1,borderTop:`1px solid ${C.br}`,display:'flex'}}>
      {NAV.map(t=>(
        <button key={t.key} onClick={()=>{setTab(t.key);backList();}} style={{flex:1,background:'none',border:'none',color:tab===t.key?C.ac:C.mu,padding:'10px 0 12px',cursor:'pointer',fontFamily:'inherit',fontSize:10,fontWeight:700,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
          <span style={{fontSize:20}}>{t.icon}</span>{t.label}
        </button>
      ))}
      <button onClick={onLogout} style={{flex:1,background:'none',border:'none',color:C.mu,padding:'10px 0 12px',cursor:'pointer',fontFamily:'inherit',fontSize:10,fontWeight:700,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
        <span style={{fontSize:20}}>🔐</span>Έξοδος
      </button>
    </div>
  </div>);
}

// ─── DELETED EVENTS ARCHIVE ───────────────────────────────────────────────
function DeletedEventsArchive({auth,events,onRestore,onBack}){
  return(<div style={{padding:24}} className="fade">
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <BackBtn onClick={onBack}/>
      <div style={{fontSize:22,fontWeight:800}}>Αρχείο Διαγραμμένων</div>
    </div>
    {events.length===0?<Empty text="Δεν υπάρχουν διαγραμμένα events"/>:
      events.map(ev=><Card key={ev.EventID} style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{ev.Name}</div>
            <Mono s c={C.mu}>{fmtDate(ev.Date)}{ev.Venue?' · '+ev.Venue:''}</Mono>
            <Mono s c={C.mu}>{ev.Type}</Mono>
          </div>
          <button onClick={()=>onRestore(ev.EventID)} style={{background:C.ok+'22',border:`1px solid ${C.ok}44`,color:C.ok,borderRadius:8,padding:'6px 12px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer',fontWeight:700,flexShrink:0}}>↺ ΕΠΑΝΑΦΟΡΑ</button>
        </div>
      </Card>)
    }
  </div>);
}


// ─── EVENTS LIST ──────────────────────────────────────────────────────────
function EventsList({events,loading,onCreate,onOpen,isPM,onArchive}){
  const [filter,setFilter]=useState('upcoming');
  const now=todayStr();
  const filtered=events.filter(e=>{
    if(filter==='upcoming') return (e.Date>=now||!e.Date)&&e.Status!=='closed';
    if(filter==='past')     return e.Date<now||e.Status==='closed';
    return true;
  });
  return(<div style={{padding:24}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <div style={{fontSize:28,fontWeight:800,letterSpacing:-0.5}}>Events</div>
      <div style={{display:'flex',gap:8}}>
        {isPM&&onArchive&&<button onClick={onArchive} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:10,padding:'9px 12px',fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:10,cursor:'pointer'}}>🗑 Αρχείο</button>}
        <button onClick={onCreate} style={{background:C.ac,color:'#000',border:'none',borderRadius:10,padding:'10px 18px',fontFamily:'inherit',fontWeight:800,fontSize:14,cursor:'pointer'}}>+ Νέο</button>
      </div>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:20}}>
      {[['upcoming','Επερχόμενα'],['past','Παρελθόν'],['all','Όλα']].map(([k,l])=>(
        <button key={k} onClick={()=>setFilter(k)} style={{background:filter===k?C.ac:'transparent',color:filter===k?'#000':C.mu,border:`1px solid ${filter===k?C.ac:C.br}`,borderRadius:8,padding:'6px 14px',fontFamily:'inherit',fontWeight:700,fontSize:12,cursor:'pointer'}}>{l}</button>
      ))}
    </div>
    {loading?<div style={{textAlign:'center',padding:60}}><Spin/></div>
      :filtered.length===0?<Empty text="Δεν υπάρχουν events"/>
      :filtered.map(ev=><EventCard key={ev.EventID} event={ev} isPM={isPM} onClick={()=>onOpen(ev.EventID)}/>)
    }
  </div>);
}

function EventCard({event,onClick,isPM}){
  const {costPct,crewCostWarning,totalCrewCost,crewCount}=event;
  return(<div onClick={onClick} style={{background:C.s1,border:`1px solid ${isPM&&crewCostWarning?C.er:C.br}`,borderRadius:14,padding:'16px 18px',marginBottom:10,cursor:'pointer'}} className="fade">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
      <div style={{flex:1,marginRight:12}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:2}}>{event.Name}</div>
        <Mono s c={C.mu}>{fmtDate(event.Date)}{event.Venue?' · '+event.Venue:''}</Mono>
      </div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
        <StatusBadge status={event.Status}/>
        <div style={{background:C.s2,borderRadius:6,padding:'3px 8px',fontFamily:"'DM Mono',monospace",fontSize:12,color:C.ac,letterSpacing:3}}>{event.EventCode}</div>
      </div>
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      {isPM
        ?<Mono s c={C.mu}>{crewCount} άτομα · {totalCrewCost}€ crew{event.Revenue>0?' / '+event.Revenue+'€':''}</Mono>
        :<Mono s c={C.mu}>{crewCount} άτομα</Mono>
      }
      {isPM&&crewCostWarning&&<Mono s c={C.er}>⚠ {costPct}%</Mono>}
    </div>
  </div>);
}

// ─── EVENT FORM ───────────────────────────────────────────────────────────
function EventForm({auth,event,clients,onSave,onBack}){
  const [f,setF]=useState({
    eventId:event?.EventID||'',name:event?.Name||'',date:event?.Date||'',
    startTime:event?.StartTime||'',type:event?.Type||'Corporate',
    venue:event?.Venue||'',mapsLink:event?.MapsLink||'',
    revenue:event?.Revenue||'',travelPrefectures:event?.TravelPrefectures||0,
    contactName:event?.ContactName||'',contactPhone:event?.ContactPhone||'',
    contactEmail:event?.ContactEmail||'',notes:event?.Notes||'',
    clientId:event?.ClientID||'',
  });
  const [saving,setSaving]=useState(false);
  const [geoState,setGeoState]=useState({loading:false,prefecture:'',confidence:'',prefectures:null});
  const [newClientOpen,setNewClientOpen]=useState(false);
  const [newClient,setNewClient]=useState({name:'',phone:'',email:''});
  const [savingClient,setSavingClient]=useState(false);
  const geoTimer=useRef(null);
  const lastCalcLink=useRef('');
  const s=(k,v)=>setF(x=>({...x,[k]:v}));

  // Auto-calc travel prefectures from Maps URL
  useEffect(()=>{
    const link=(f.mapsLink||'').trim();
    if(!link||link===lastCalcLink.current){if(!link)setGeoState({loading:false,prefecture:'',confidence:'',prefectures:null});return;}
    clearTimeout(geoTimer.current);
    geoTimer.current=setTimeout(async()=>{
      setGeoState(p=>({...p,loading:true}));
      try{
        const res=await call('calcTravelPrefectures',auth.pin,link);
        lastCalcLink.current=link;
        setGeoState({loading:false,prefecture:res.prefecture||'',confidence:res.confidence||'',prefectures:res.prefectures??null});
        if(res.confidence==='high'&&res.prefectures!==null){
          setF(x=>({...x,travelPrefectures:res.prefectures}));
        }
      }catch(e){setGeoState({loading:false,prefecture:'',confidence:'error',prefectures:null});}
    },600);
    return()=>clearTimeout(geoTimer.current);
  },[f.mapsLink,auth.pin]);

  // When client selected, auto-fill contact fields if empty
  const handleClientSelect=(clientId)=>{
    s('clientId',clientId);
    if(!clientId)return;
    const cl=(clients||[]).find(c=>c.ClientID===clientId);
    if(!cl)return;
    setF(x=>({...x,clientId,
      contactName:x.contactName||cl.Name||'',
      contactPhone:x.contactPhone||cl.Phone||'',
      contactEmail:x.contactEmail||cl.Email||'',
    }));
  };

  const saveNewClient=async()=>{
    if(!newClient.name)return;
    setSavingClient(true);
    try{
      const r=await call('addClient',auth.pin,newClient);
      // Reload clients list via parent refresh not available here, just select by returned id
      // Auto-fill form
      setF(x=>({...x,clientId:r.clientId,
        contactName:x.contactName||newClient.name,
        contactPhone:x.contactPhone||newClient.phone,
        contactEmail:x.contactEmail||newClient.email,
      }));
      setNewClientOpen(false);setNewClient({name:'',phone:'',email:''});
    }catch(e){alert('Σφάλμα: '+e.message);}
    setSavingClient(false);
  };

  const doSave=async()=>{if(!f.name)return;setSaving(true);try{await onSave(f);}finally{setSaving(false);}};
  const geoColor=geoState.confidence==='high'?C.ok:geoState.confidence==='low'?C.wa:C.mu;
  const selectedClient=(clients||[]).find(c=>c.ClientID===f.clientId);

  return(<div style={{padding:'24px 24px 120px'}} className="fade">
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:28}}>
      <BackBtn onClick={onBack}/>
      <div style={{fontSize:20,fontWeight:800}}>{event?'Επεξεργασία Event':'Νέο Event'}</div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Client picker */}
      <div>
        <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>ΠΕΛΑΤΗΣ</Mono>
        {selectedClient&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:C.ac+'18',border:`1px solid ${C.ac}44`,borderRadius:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13}}>{selectedClient.Name}</div>
            <Mono s c={C.mu}>{[selectedClient.Phone,selectedClient.Email].filter(Boolean).join(' · ')||'Χωρίς στοιχεία'}</Mono>
          </div>
          <button onClick={()=>s('clientId','')} style={{background:'none',border:'none',color:C.mu,cursor:'pointer',fontSize:18}}>×</button>
        </div>}
        {!selectedClient&&<div style={{display:'flex',gap:8}}>
          <select value={f.clientId} onChange={e=>handleClientSelect(e.target.value)}
            style={{flex:1,background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'11px 13px',color:f.clientId?C.tx:C.mu,fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:14,outline:'none'}}>
            <option value=''>Επίλεξε ή δημιούργησε πελάτη…</option>
            {(clients||[]).map(c=><option key={c.ClientID} value={c.ClientID}>{c.Name}{c.Phone?' · '+c.Phone:''}</option>)}
          </select>
          <button onClick={()=>setNewClientOpen(n=>!n)} style={{background:newClientOpen?C.ac:'none',color:newClientOpen?'#000':C.ac,border:`1px solid ${C.ac}`,borderRadius:8,padding:'8px 12px',fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>+ Νέος</button>
        </div>}
        {newClientOpen&&<div style={{marginTop:8,padding:'12px',background:C.s2,borderRadius:10,border:`1px solid ${C.ac}44`}}>
          <Mono s c={C.ac} style={{marginBottom:10,letterSpacing:1}}>ΝΕΟΣ ΠΕΛΑΤΗΣ</Mono>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <Inp label="Όνομα *" value={newClient.name} onChange={v=>setNewClient(f=>({...f,name:v}))} placeholder="π.χ. Γιώργος Παπαδόπουλος"/>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}><Inp label="Τηλέφωνο" value={newClient.phone} onChange={v=>setNewClient(f=>({...f,phone:v}))} placeholder="69…"/></div>
              <div style={{flex:1}}><Inp label="Email" value={newClient.email} onChange={v=>setNewClient(f=>({...f,email:v}))} placeholder="@"/></div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <Btn onClick={saveNewClient} disabled={savingClient||!newClient.name} accent style={{flex:1}}>{savingClient?'…':'Αποθήκευση'}</Btn>
              <Btn onClick={()=>{setNewClientOpen(false);setNewClient({name:'',phone:'',email:''}); }} style={{flex:1}}>Άκυρο</Btn>
            </div>
          </div>
        </div>}
      </div>

      <Inp label="Όνομα Event *" value={f.name} onChange={v=>s('name',v)} placeholder="π.χ. Γάμος Παπαδόπουλου"/>
      <div style={{display:'flex',gap:12}}>
        <div style={{flex:1}}><Inp label="Ημερομηνία" value={f.date} onChange={v=>s('date',v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Τύπος" value={f.type} onChange={v=>s('type',v)} options={EV_TYPES}/></div>
      </div>
      <div style={{display:'flex',gap:12}}>
        <div style={{flex:1}}><Inp label="Deadline" value={f.startTime} onChange={v=>s('startTime',v)} type="time" placeholder="π.χ. 20:00"/></div>
        <div style={{flex:1}}><Inp label="Venue" value={f.venue} onChange={v=>s('venue',v)} placeholder="Crystal Hall"/></div>
      </div>
      <div>
        <Inp label="Google Maps URL" value={f.mapsLink} onChange={v=>s('mapsLink',v)} placeholder="https://maps.app.goo.gl/…"/>
        {geoState.loading&&<div style={{marginTop:6,display:'flex',alignItems:'center',gap:6}}><Spin/><Mono s c={C.mu}>Εντοπισμός νομού…</Mono></div>}
        {!geoState.loading&&geoState.prefecture&&<div style={{marginTop:6,padding:'6px 12px',background:geoColor+'18',border:`1px solid ${geoColor}44`,borderRadius:7,display:'flex',justifyContent:'space-between'}}>
          <Mono s c={geoColor}>📍 {geoState.prefecture}</Mono>
          <Mono s c={geoColor} style={{fontWeight:700}}>{geoState.prefectures!==null?geoState.prefectures+' νομ. ×20€':''}</Mono>
        </div>}
      </div>
      <div style={{display:'flex',gap:12}}>
        <div style={{flex:1}}><Inp label="Έσοδο (€)" value={f.revenue} onChange={v=>s('revenue',v)} type="number" placeholder="0"/></div>
        <div style={{flex:1}}>
          <Mono s c={C.mu} style={{marginBottom:5,letterSpacing:2}}>ΝΟΜΟΙ ΕΚΤΟΣ ΘΚ</Mono>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input type="number" min="0" value={f.travelPrefectures} onChange={e=>s('travelPrefectures',e.target.value)} style={{flex:1,background:C.s2,border:`1px solid ${geoState.confidence==='high'?C.ok:C.br}`,borderRadius:8,padding:'11px 13px',color:C.tx,fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:14,outline:'none'}}/>
            {geoState.confidence==='high'&&Number(f.travelPrefectures)===geoState.prefectures&&<div style={{fontSize:11,color:C.ok}}>✓</div>}
          </div>
          {Number(f.travelPrefectures)>0&&<Mono s c={C.mu} style={{marginTop:4}}>= {Number(f.travelPrefectures)*20}€ / άτομο</Mono>}
        </div>
      </div>
      <div style={{borderTop:`1px solid ${C.br}`,paddingTop:16}}>
        <Mono s c={C.mu} style={{marginBottom:12,letterSpacing:2}}>ΣΤΟΙΧΕΙΑ ΕΠΙΚΟΙΝΩΝΙΑΣ</Mono>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Inp label="Όνομα επαφής" value={f.contactName} onChange={v=>s('contactName',v)} placeholder="π.χ. Μαρία Κ."/>
          <div style={{display:'flex',gap:12}}>
            <div style={{flex:1}}><Inp label="Τηλέφωνο" value={f.contactPhone} onChange={v=>s('contactPhone',v)} placeholder="69…"/></div>
            <div style={{flex:1}}><Inp label="Email" value={f.contactEmail} onChange={v=>s('contactEmail',v)} placeholder="maria@…"/></div>
          </div>
        </div>
      </div>
      <Inp label="Σημειώσεις" value={f.notes} onChange={v=>s('notes',v)} placeholder="Πληροφορίες για το event…" multi/>
    </div>
    <StickyBar>
      <BigBtn onClick={doSave} disabled={!f.name||saving}>{saving?'Αποθήκευση…':event?'Αποθήκευση':'Δημιουργία Event'}</BigBtn>
    </StickyBar>
  </div>);
}

// ─── CLIENTS TAB ─────────────────────────────────────────────────────────
function ClientsTab({auth,clients,refresh,isPM}){
  const [search,setSearch]=useState('');
  const [adding,setAdding]=useState(false);
  const [editId,setEditId]=useState(null);
  const [f,setF]=useState({name:'',phone:'',email:'',notes:''});
  const [saving,setSaving]=useState(false);
  const [importing,setImporting]=useState(false);
  const {msg,show}=useMsg();

  const filtered=(clients||[]).filter(c=>
    !search||c.Name?.toLowerCase().includes(search.toLowerCase())||
    c.Phone?.includes(search)||c.Email?.toLowerCase().includes(search.toLowerCase())
  );

  const doAdd=async()=>{
    if(!f.name)return;setSaving(true);
    try{await call('addClient',auth.pin,f);setAdding(false);setF({name:'',phone:'',email:'',notes:''});await refresh();show('✅ Προστέθηκε');}
    catch(e){show('❌ '+e.message);}setSaving(false);
  };

  const doUpdate=async()=>{
    if(!f.name)return;setSaving(true);
    try{await call('updateClient',auth.pin,{clientId:editId,...f});setEditId(null);await refresh();show('✅ Αποθηκεύτηκε');}
    catch(e){show('❌ '+e.message);}setSaving(false);
  };

  const doDelete=async(id)=>{
    if(!confirm('Διαγραφή πελάτη;'))return;
    try{await call('deleteClient',auth.pin,id);await refresh();show('✅ Διαγράφηκε');}
    catch(e){show('❌ '+e.message);}
  };

  const handleImport=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setImporting(true);
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        const text=ev.target.result;
        const r=await call('importClientsFromLIM',auth.pin,text);
        await refresh();
        show(`✅ Εισήχθησαν ${r.imported} · Υπήρχαν ήδη ${r.skipped}`);
      }catch(err){show('❌ '+err.message);}
      setImporting(false);
    };
    reader.readAsText(file,'windows-1253');
    e.target.value='';
  };

  return(<div style={{padding:24}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <div>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:-0.5}}>Πελάτες</div>
        <Mono s c={C.mu}>{(clients||[]).length} καταχωρημένοι</Mono>
      </div>
      <div style={{display:'flex',gap:8}}>
        {isPM&&<>
          <label style={{background:C.s2,border:`1px solid ${C.br}`,color:C.mu,borderRadius:10,padding:'8px 12px',fontFamily:'inherit',fontSize:12,cursor:'pointer',fontWeight:700}}>
            {importing?'…':'↑ LIM'}
            <input type="file" accept=".csv" style={{display:'none'}} onChange={handleImport}/>
          </label>
          <button onClick={()=>{setAdding(a=>!a);setEditId(null);setF({name:'',phone:'',email:'',notes:''}); }} style={{background:C.ac,color:'#000',border:'none',borderRadius:10,padding:'10px 16px',fontFamily:'inherit',fontWeight:800,fontSize:13,cursor:'pointer'}}>{adding?'Κλείσιμο':'+ Νέος'}</button>
        </>}
      </div>
    </div>
    <Toast msg={msg}/>

    {/* Add form */}
    {adding&&<Card style={{marginBottom:16,border:`1px solid ${C.ac}44`}}>
      <Mono s c={C.ac} style={{marginBottom:12,letterSpacing:1}}>ΝΕΟΣ ΠΕΛΑΤΗΣ</Mono>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Inp label="Όνομα *" value={f.name} onChange={v=>setF(x=>({...x,name:v}))} placeholder="Γιώργος Παπαδόπουλος"/>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><Inp label="Τηλέφωνο" value={f.phone} onChange={v=>setF(x=>({...x,phone:v}))} placeholder="69…"/></div>
          <div style={{flex:1}}><Inp label="Email" value={f.email} onChange={v=>setF(x=>({...x,email:v}))} placeholder="@"/></div>
        </div>
        <Inp label="Σημειώσεις" value={f.notes} onChange={v=>setF(x=>({...x,notes:v}))}/>
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={doAdd} disabled={saving||!f.name} accent style={{flex:1}}>{saving?'…':'Προσθήκη'}</Btn>
          <Btn onClick={()=>setAdding(false)} style={{flex:1}}>Άκυρο</Btn>
        </div>
      </div>
    </Card>}

    {/* Search */}
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Αναζήτηση ονόματος, τηλ, email…"
      style={{width:'100%',background:C.s2,border:`1px solid ${C.br}`,borderRadius:8,padding:'10px 14px',color:C.tx,fontFamily:'inherit',fontSize:14,outline:'none',marginBottom:12}}/>

    {/* List */}
    {filtered.length===0?<Empty text="Δεν βρέθηκαν πελάτες"/>:filtered.map(c=>(
      <div key={c.ClientID}>
        {editId===c.ClientID?(
          <Card style={{marginBottom:8,border:`1px solid ${C.ac}44`}}>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <Inp label="Όνομα *" value={f.name} onChange={v=>setF(x=>({...x,name:v}))}/>
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1}}><Inp label="Τηλέφωνο" value={f.phone} onChange={v=>setF(x=>({...x,phone:v}))}/></div>
                <div style={{flex:1}}><Inp label="Email" value={f.email} onChange={v=>setF(x=>({...x,email:v}))}/></div>
              </div>
              <Inp label="Σημειώσεις" value={f.notes} onChange={v=>setF(x=>({...x,notes:v}))}/>
              <div style={{display:'flex',gap:8}}>
                <Btn onClick={doUpdate} disabled={saving||!f.name} accent style={{flex:1}}>{saving?'…':'Αποθήκευση'}</Btn>
                <Btn onClick={()=>setEditId(null)} style={{flex:1}}>Άκυρο</Btn>
              </div>
            </div>
          </Card>
        ):(
          <div style={{display:'flex',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${C.br}`}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14}}>{c.Name}</div>
              <Mono s c={C.mu}>{[c.Phone,c.Email].filter(Boolean).join(' · ')||'Χωρίς στοιχεία'}</Mono>
            </div>
            {isPM&&<div style={{display:'flex',gap:6}}>
              <button onClick={()=>{setEditId(c.ClientID);setAdding(false);setF({name:c.Name||'',phone:c.Phone||'',email:c.Email||'',notes:c.Notes||''}); }} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:6,padding:'4px 9px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer'}}>ΕΠΕΞ</button>
              <button onClick={()=>doDelete(c.ClientID)} style={{background:'none',border:`1px solid ${C.er}44`,color:C.er,borderRadius:6,padding:'4px 9px',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer'}}>×</button>
            </div>}
          </div>
        )}
      </div>
    ))}
  </div>);
}

// ─── CLIENT FEEDBACK SECTION ─────────────────────────────────────────────
function ClientFeedbackSection({auth,eventId,isPM}){
  const [feedback,setFeedback]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!isPM){setLoading(false);return;}
    call('getEventFeedback',auth.pin,eventId)
      .then(d=>setFeedback(d||[]))
      .catch(()=>setFeedback([]))
      .finally(()=>setLoading(false));
  },[]);
  if(!isPM||loading)return null;
  if(!feedback||!feedback.length)return(
    <Card style={{marginBottom:16,opacity:0.6}}>
      <Mono s c={C.mu} style={{letterSpacing:2}}>CLIENT FEEDBACK</Mono>
      <Mono s c={C.mu} style={{marginTop:6}}>Δεν υπάρχει feedback ακόμα</Mono>
    </Card>
  );
  const kLabels={k1:'Punctuality',k2:'Behaviour',k3:'Adaptability',k4:'Technical'};
  return(<Card style={{marginBottom:16}}>
    <Mono s c={C.mu} style={{letterSpacing:2,marginBottom:10}}>CLIENT FEEDBACK · {feedback.length}</Mono>
    {feedback.map((fb,i)=>{
      const avg=((fb.k1+fb.k2+fb.k3+fb.k4)/4).toFixed(1);
      const col=Number(avg)>=4?C.ok:Number(avg)>=3?C.wa:C.er;
      return(<div key={i} style={{padding:'10px 0',borderTop:i?`1px solid ${C.br}`:''}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <Mono s c={C.mu}>{fb.timestamp}</Mono>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:700,color:col}}>{avg}/5</div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:fb.comment?6:0}}>
          {['k1','k2','k3','k4'].map(k=>{
            const v=fb[k]; const c=v>=4?C.ok:v>=3?C.wa:C.er;
            return(<div key={k} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <div style={{width:32,height:32,borderRadius:6,background:c+'22',border:`1px solid ${c}44`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:c}}>{v||'—'}</div>
              <Mono s c={C.mu} style={{fontSize:8}}>{kLabels[k]}</Mono>
            </div>);
          })}
        </div>
        {fb.comment&&<div style={{fontSize:12,color:C.tx,fontStyle:'italic',marginTop:4,padding:'6px 10px',background:C.s2,borderRadius:6}}>"{fb.comment}"</div>}
      </div>);
    })}
  </Card>);
}

// ─── EVENT DETAIL ─────────────────────────────────────────────────────────
function EventDetail({auth,eventId,collabs,vehicles,warehouse,busyMap,clients,onEdit,onDelete,onBack,onRefresh,isPM}){
  const [ev,setEv]=useState(null);
  const [loading,setLoading]=useState(true);
  const [panel,setPanel]=useState(null);
  const {msg,show}=useMsg();
  const [confirmDel,setConfirmDel]=useState(false);
  const [emailBusy,setEmailBusy]=useState(false);

  const load=useCallback(async()=>{
    setLoading(true);
    try{const d=await call('getEventById',auth.pin,eventId);setEv(d);}catch(e){show('❌ '+e.message);}
    setLoading(false);
  },[auth.pin,eventId]);

  useEffect(()=>{load();},[load]);

  if(loading)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><Spin/></div>;
  if(!ev)return<div style={{padding:40,color:C.er,textAlign:'center'}}>Event not found</div>;

  const asgn=ev.assignments||[], eq=ev.equipment||[], veh=ev.vehicles||[], inc=ev.incidents||[];
  const totalCost=asgn.reduce((s,a)=>s+(Number(a.TotalFee)||0),0);
  const pct=k=>eq.length>0?Math.round(eq.filter(i=>i[k]).length/eq.length*100):0;

  if(panel==='scheduling') return <SchedulingPanel auth={auth} ev={ev} collabs={collabs} busyMap={busyMap||{}} onDone={async()=>{await load();await onRefresh();setPanel(null);}} onBack={()=>setPanel(null)}/>;
  if(panel==='rider')      return <RiderPanel auth={auth} ev={ev} warehouse={warehouse} onDone={async()=>{await load();setPanel(null);}} onBack={()=>setPanel(null)}/>;
  if(panel==='vehicles')   return <VehicleAssignPanel auth={auth} ev={ev} vehicles={vehicles} collabs={collabs} onDone={async()=>{await load();setPanel(null);}} onBack={()=>setPanel(null)}/>;
  if(panel==='postEvent')  return <PostEventPanel auth={auth} ev={ev} onDone={async()=>{await load();await onRefresh();setPanel(null);}} onBack={()=>setPanel(null)}/>;

  const sendEmails=async()=>{
    setEmailBusy(true);
    try{const r=await call('sendNotifications',auth.pin,eventId);show(`✅ Εστάλη σε ${r.count} άτομα`);}
    catch(e){show('❌ '+e.message);}
    setEmailBusy(false);
  };

  return(<div style={{padding:'24px 24px 40px'}} className="fade">
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
      <BackBtn onClick={onBack}/>
      <div style={{flex:1,fontSize:22,fontWeight:800,letterSpacing:-0.3}}>{ev.Name}</div>
      <button onClick={()=>onEdit(ev)} style={{background:'none',border:`1px solid ${C.br}`,color:C.mu,borderRadius:8,padding:'6px 12px',fontFamily:'inherit',fontSize:12,cursor:'pointer'}}>Επεξ.</button>
    </div>
    <div style={{paddingLeft:48,marginBottom:16}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <StatusBadge status={ev.Status}/>
        <Mono s c={C.mu}>{fmtDate(ev.Date)} · {ev.Type}</Mono>
        {ev.StartTime&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:11,padding:'2px 8px',borderRadius:5,background:C.ac+'22',color:C.ac,border:`1px solid ${C.ac}44`,fontWeight:700}}>READY {ev.StartTime}</span>}
      </div>
      {ev.Venue&&<Mono s c={C.mu}>{ev.Venue}</Mono>}
      {isPM&&<Mono s c={C.mu} style={{marginTop:2,opacity:0.5}}>ID: {ev.EventID}</Mono>}
    </div>

    <Toast msg={msg}/>

    {/* Code */}
    <Card style={{marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><Mono s c={C.mu} style={{marginBottom:4,letterSpacing:2}}>CREW CODE</Mono>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:36,fontWeight:700,color:C.ac,letterSpacing:8}}>{ev.EventCode}</div></div>
      <Mono s c={C.mu} style={{textAlign:'right',lineHeight:1.8}}>Στείλε<br/>Viber</Mono>
    </Card>

    {/* Links */}
    {ev.MapsLink&&<a href={ev.MapsLink} target="_blank" style={{display:'flex',alignItems:'center',gap:8,background:C.s1,border:`1px solid ${C.br}`,borderRadius:10,padding:'11px 14px',marginBottom:10,color:C.tx,textDecoration:'none'}}><span>📍</span><Mono s>Google Maps</Mono></a>}

    {/* Contact */}
    {ev.ContactName&&<Card style={{marginBottom:12}}>
      <Mono s c={C.mu} style={{marginBottom:8,letterSpacing:2}}>ΕΠΑΦΗ</Mono>
      <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{ev.ContactName}</div>
      <div style={{display:'flex',gap:12}}>
        {ev.ContactPhone&&<a href={`tel:${ev.ContactPhone}`} style={{color:C.ac,fontFamily:"'DM Mono',monospace",fontSize:12,textDecoration:'none'}}>{ev.ContactPhone}</a>}
        {ev.ContactEmail&&<a href={`mailto:${ev.ContactEmail}`} style={{color:C.inf,fontFamily:"'DM Mono',monospace",fontSize:12,textDecoration:'none'}}>{ev.ContactEmail}</a>}
      </div>
    </Card>}

    {/* Revenue / cost — PM only */}
    {isPM&&<Card style={{marginBottom:12}}>
      <CostGauge cost={totalCost} revenue={Number(ev.Revenue)||0}/>
    </Card>}

    {/* Crew summary */}
    <div style={{display:'flex',gap:6,marginBottom:12}}>
      {['prep','load','loadout'].map((k,i)=><ProgPill key={k} label={['PREP','LOAD','OUT'][i]} v={pct(k)}/>)}
    </div>

    {/* Action buttons */}
    {ev.Status!=='closed'&&<div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
      <div style={{display:'flex',gap:8}}>
        <Btn onClick={()=>setPanel('scheduling')} style={{flex:1}}>👥 Scheduling</Btn>
        <Btn onClick={()=>setPanel('rider')} style={{flex:1}}>📦 Rider</Btn>
      </div>
      <div style={{display:'flex',gap:8}}>
        <Btn onClick={()=>setPanel('vehicles')} style={{flex:1}}>🚐 Οχήματα</Btn>
        <Btn onClick={sendEmails} disabled={emailBusy} style={{flex:1}}>📧 {emailBusy?'…':'Email Crew'}</Btn>
      </div>
      <Btn onClick={()=>setPanel('postEvent')} style={{width:'100%'}}>⚡ Post-Event (Υπερωρίες / Incidents)</Btn>
    </div>}

    {ev.Status==='closed'&&ev.ContactEmail&&<div style={{marginBottom:16}}>
      <Btn onClick={async()=>{try{await call('sendFeedbackEmailNow',auth.pin,eventId);show('✅ Feedback email εστάλη');}catch(e){show('❌ '+e.message);}}} full>Αποστολή Feedback Email στον Πελάτη{ev.FeedbackEmailSent==='SENT'?' (ξανά)':''}</Btn>
    </div>}

    {/* Client Feedback display */}
    {ev.Status==='closed'&&<ClientFeedbackSection auth={auth} eventId={eventId} isPM={isPM}/>}

    {/* Crew list */}
    {asgn.length>0&&<div style={{marginBottom:16}}>
      <SecHdr title={`CREW · ${asgn.length}`}/>
      {asgn.map(a=><CrewAssignRow key={a.RowID} auth={auth} a={a} ev={ev} collabs={collabs} busyMap={busyMap||{}} isPM={isPM} onRefresh={async()=>{await load();await onRefresh();}}/>)}
    </div>}

    {/* Equipment list */}
    {eq.length>0&&<div style={{marginBottom:16}}>
      <SecHdr title={`ΕΞΟΠΛΙΣΜΟΣ · ${eq.length}`}/>
      {eq.map(item=><div key={item.RowID} style={{display:'flex',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.br}`}}>
        <div style={{width:3,height:28,background:CAT_C[item.category]||C.mu,borderRadius:2,marginRight:10,flexShrink:0}}/>
